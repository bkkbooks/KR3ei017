body:
  text: 卷七産後虛渴産後血熱心煩口燥者涼血飲虛煩而渴者生脈散蓋産後虛渴氣少腳弱頭目眩暈飲食無味熟地黃湯或四物加麥冬花粉涼血飲治産後虛煩發渴黃芩二錢酒炒赤芍二錢川芎二錢甘草一錢荊芥二錢花粉二錢生地二錢麥冬二錢上藥分作二服每服加竹葉七片燈心二十莖水煎生脈散生津止渴人參麥冬五味水煎服熟地黃湯人參四錢甘草一錢花粉六錢麥冬三錢熟地五錢分作二服元米一撮薑棗煎服産後浮腫産後敗血停蓄五臟循經流入四肢化為水因成虛浮腫者調經散産後氣血大虛肢體浮腫者不可通利其水宜大補氣血四君子湯加蒼朮調經散當歸一兩赤芍兩肉桂一兩沒藥一錢琥珀一錢麝香五分細辛五分炙甘草二錢共為細末每服五分入薑汁少許酒調下産後發熱薛古愚曰産後發熱因去血過多則血虛血虛則陰虛陰虛則生內熱心胸悶煩氣短頭疼眩亂骨節痠疼晡時轉甚與大病後虛煩悶相類者宜人參當歸散主之如血虛生熱而自汗者逍遙散若産後臍下發熱非熟地不能治若産後發熱不已必用炒黑乾薑詳見丹溪治産後日晡發熱轉甚非柴胡不能治若外皮熱而內不熱者及兩足覺冷者此胃風也宜芎蘇飲産後寒熱惡露未淨停住胞絡而發熱者仍以行血為主小腹痛者是也輕則四烏湯重則醋個散或以吐瀉五積散有食加消導藥惡露淨者小腹不痛是也若産後因下血過多而忽發寒熱者此因營衛虛損陰陽不和也宜加減四物湯初産作乳初産有作乳者有産下而不育乳汁者膨上俱致發熱但此症與惡露未淨停胞絡而發熱者相似而實不同宜細細辨之小腹痛者惡露停蓄也不宜服加減四物湯若小腹不痛者陰陽不和也宜服之若往來寒熱小柴胡湯主之寒熱而盜汗如雨者麥煎散主之皇甫中曰産後血虛發熱頭痛自汗心煩氣短者人參當歸散産後陰虛氣血不足而發熱日輕夜重而惡寒者四物湯加炮薑微熱加茯苓産後蒸乳發熱者用四物加黃耆人參白朮花粉人參當歸湯熟地一兩人參一兩當歸一兩麥冬一兩肉桂一兩白芍一錢炒每服五錢加薑竹葉煎服産後風痿産後諸風痿弱筋攣無力者血風湯産後氣弱汗多風搏之而成痓口噤角弓反張脊強汗出不止者難治大聖散加川芎黃耆血風湯秦艽一錢羌活一錢防風七分白芍一錢酒炒大熟地二錢白芷八分川芎一錢白朮一錢炒歸身一錢半炙黃耆錢半茯苓一錢半夏一錢水煎服産後怔忡大聖散治産後因驚而發心神不定怔忡恍惚川芎一兩黃耆一兩蜜炙當歸一兩木香一兩人參一兩甘草一兩茯神一兩麥冬一兩上藥銼為末每服七錢薑三片水二盞煎至八分空心服産後血少怔忡恍惚驚悸睡不安寧者益榮湯或養心湯寧志丸産後心恍惚者茯苓散益榮湯當歸錢半黃耆一錢炙遠志一錢棗仁一錢炒柏子仁一錢炒茯神一錢人參一錢白芍八分炒甘草三分炒紫石英八分薑三片水煎服養心湯治産後心虛血少恍惚驚悸不安黃耆五錢茯神五錢遠志肉五錢當歸五錢人參二錢半夏曲川芎各五錢棗仁二錢半炒肉桂二錢半五味三錢柏子仁二錢甘草四錢炙上為粗末每服三錢加薑三片水煎服茯苓散人參一錢甘草一錢山藥一錢當歸一錢遠志肉一錢茯苓一錢桂心一錢麥冬一錢大棗三枚水煎服産後中風産後中風口噤不省人事牙關口閉手足瘛瘲者舉輕古拜散産後血大虧損經絡空虛勞碌太早風邪乘虛而入者小續命湯或愈風湯中風角弓反張涎潮湧出大豆子湯小續命湯麻黃一錢人參一錢黃芩一錢白芍一錢炒川芎一錢甘草八分杏仁十四粒防己一錢肉桂七分附子一錢制水煎服大豆子湯大黑豆一升炒令焦黑候煙起以好酒三升沃之入瓶內水貯聽用每用此酒半升入獨活五錢同煎十沸溫服血暈氣脫産後血暈與氣脫宜分別治之血暈是實證逐瘀為主此因惡露不行惡血衝心而心下滿急神昏口噤不省人事者切勿放倒急與生化湯失笑丹或佛手散氣脫是虛證補正為主此因平素虛弱臨産用力勞傷去血過多亦致昏暈不醒微虛者少煩即蘇大虛者血竭即死但察其面白口開自汗手足冷厥六脈微極是氣脫症也生死判於頃刻勿令散倒令旁人挽住頭髮急與大劑參歸附子等回其陽或增損四物湯煎濃徐徐灌之但能下咽即可得生若誤認血暈而以行血藥投之益速其斃也治宜細心詳究産後陰虛産後陰虛血耗四物湯加炮薑産後去血過多陰虛而致內熱煩悶呼吸氣短頭痛悶亂骨節煩疼人參當歸散陰虛發熱者小柴胡湯去半夏加花粉人參當歸散人參一兩當歸一兩肉桂一兩熟地一兩每服五錢加竹葉生薑煎服小柴胡湯人參半夏黃芩柴胡甘草加薑水煎産後瘧疾産後瘧疾宜分別施治有寒熱相兼有熱多寒少草果飲子或青皮飲寒多養胃湯或四獸飲之類草果飲草果一錢川芎一錢紫蘇一錢白芷一錢良薑七分甘草八分陳皮八分青皮一錢水煎四獸飲人參一錢白朮一錢炒陳皮一錢二分茯苓一錢二分甘草五分草果八分烏梅三個半夏六分加薑棗水煎服勝金丹常山四兩酒蒸尖檳榔一兩共為末醋糊丸未發時先吞三十丸至五更再吞十五丸溫酒送下丸如菀豆大發時切不可服養胃湯見胎前産後傷風産後血氣大虧縱有寒不可大發汗芎歸湯加人參蘇葉葛根微汗之故鄭氏只用帶須蔥煎湯服如熱不止黃龍湯加芎歸大熱不得已加知母黃連可攻可溫者臨時斟酌不可妄投峻劑耗損真元也慎之産後泄瀉産後泄瀉小便不利而瀉此陰陽不分之故宜胃苓湯腹痛是食積宜加消食藥惡露不行宜行血若外感風寒而內傷飲食者宜養胃湯惡露已淨不必活血如未淨加歸尾桃仁之類如久瀉不止養胃湯加肉桂肉果如挾寒腹痛腸鳴小水清白不濁口不渴加肉果炒白芍如熱瀉腸垢口渴時痛時瀉火也宜薑炒黃連木通或瀉或不瀉或多或少者痰也肯堂云産後瀉痢不可混治以補脾為主如白朮茯苓神麯甘草陳皮之類兼以消食理氣之劑君苓湯白朮二錢炒茯苓二錢豬苓一錢澤瀉一錢水煎服胃苓湯即君苓湯加平胃散産後心腹痛産後敗血凝聚氣上衝心作痛大岩蜜湯七情相干血與氣並心痛元胡索湯敗血攻心腹痛失笑散寒邪腹痛理中湯大岩蜜湯治氣上衝心當歸一錢獨活一錢乾薑一錢熟地一錢甘草五分北細辛七分吳萸一錢肉桂一錢遠志一錢白芍一錢水煎服元胡索湯治心腹痛元胡一錢當歸一錢白芍一錢炒厚朴一錢薑炒文術一錢煨三稜一錢煨川楝子一錢木香一錢川芎一錢二分桔梗一錢二分檳榔一錢黃芩八分甘草七分水煎服失笑散治胃脘痛蒲黃五靈脂産後咳嗽産後咳嗽而惡露未盡二陳四物加活血藥已淨知母茯苓湯或發熱八物加黃柏知母少許或傷風咳嗽而痰多者其治法載傷風條下有惡露上攻肺經受邪咳嗽二母散血風感寒熱濕氣咳嗽痰涎坐臥不安四陰煎有外感者參蘇飲二母散治惡露上攻而嗽知母一兩貝母一兩人參八錢茯苓八錢桃仁十九粒研杏仁十四粒研每服七錢煎至八分細細呷下四陰煎保肺清金生地三錢麥冬二錢白芍二錢百合二錢沙參二錢生甘草一錢茯苓錢半水煎服夜熱盜汗加地骨皮痰多加川貝産後鬱冒由胃弱不實多汗故也血虛必厥厥必鬱冒白薇湯産後三疾鬱冒則多汗汗多則大便祕結此皆去血過多難以藥治蘇麻粥主之白薇湯治汗多白薇三錢當歸三錢人參錢半甘草七分水煎服蘇麻粥潤腸蘇子麻仁不拘多少研爛取汁煮粥食之産後腳氣産後熱悶氣上衝逆轉為腳氣小續命湯去麻黃石膏附子由平素感受風寒暑濕燥火之氣因産後血氣不足遂襲於足經因乘虛而發者獨活寄生湯獨活寄生湯獨活一錢桑寄生八分杜仲一錢牛膝一錢細辛七分秦艽一錢白茯苓一錢白芍一錢酒炒肉桂六分川芎八分防風七分人參八分炙甘草七分熟地一錢當歸一錢共為粗末水煎服産後遍身疼痛産後遍身疼痛因早勞動行走致氣血升降失常留滯於關節間筋脈牽引或手足拘攣不能伸屈故遍身肢節作疼宜趁痛散惡露不淨流於遍身肢節腰腳關節等處作痛宜如神湯趁痛散治敗血流經當歸一錢肉桂八分白朮一錢炒牛膝一錢黃耆一錢獨活八分薤白一錢寄生一錢薑三片水煎服如神湯治肢節疼痛厚朴一錢炒半夏六分枳殼七分炒白芍八分炒木香六分肉桂六分陳皮六分茯苓六分人參六分甘草五分蒼朮一錢炒茴香一錢炒香附七分醋炒桔梗八分乾薑六分川芎七分當歸一錢白芷八分木瓜六分桃仁六分水煎服産後氣喘産後氣喘由營血暴竭氣無所主觸發於肺故至喘急也此孤陽絶陰難以治療十死一生之證也若敗血停滯上逆於肺作喘者奪命丹主之鄭氏謂産後發喘最為危險經曰諸喘皆凶然此亦當視其有痰無痰痰之多少以斷其吉凶若痰壅盛而喘痰聲必大作此痰犯肺金肺不寧也法當豁痰其喘自定其喘猶可救旋覆花湯主之惡露未盡者加生薑自然汁及行血消食藥已淨而小腹不痛者加片芩服之若不咳而喘者此謂肺火所迫乃真喘也證多不治不必下藥産後厄忒産後發厄此症不宜見之新産須辨症施治如惡露未淨者多是血迷上衝所致當服行血之藥已淨而厄者多因受寒也法當順氣調脾如紫蘇飲之類産後嘔吐産後嘔惡胃氣不化也惡露未行者二陳四物加減活血藥若已行者不必活血若胸滿而嘔逆者食也宜消導之如飲食入胃而即嘔者火也納穀少頃嘔出者胃寒也宜白蔻丁香之類治之産後吞酸産後吞酸者少見或因病久脾胃虛弱致有此患耳如惡露淨後二陳湯或四物湯加薑汁炒黃連吳茱萸之類産後不語産後噤口不語乃敗血裹迷心竅所致不須恐怖但服八珍散一月自安亦有痰迷心竅者二陳四物加竹瀝薑汁甚妙如産後著風不語小續命湯主之加薑汁其法最穩而取效亦速産後頭痛産後頭痛有氣血虛弱痰厥著寒著風之不同不可一例而施治氣血虛弱者四物湯痰厥者二陳湯著寒著風者芎蘇飲隨症加減有産後感於異症手足牽搐咬牙頭痛昏冒先服四物後服秦艽丸芎蘇飲川芎蘇葉枳殼前胡葛根木香桔梗甘草陳皮半夏薑三片水煎服秦艽丸川芎當歸秦艽荊芥共為末醋糊丸每服四錢産後胞損産後胞損血水淋漓茅根湯敗血不止淋漓不休烏金散血不止久而四肢乏力沉困牡蠣散或産時穩婆誤損其尿胞以致日夜淋漓者參朮膏主之茅根湯茅根二錢瞿麥錢半葵子二錢茯苓錢半人參一錢蒲黃一錢桃膠一錢滑石錢半半夏三分石膏一錢紫貝一個燒燈心薑水煎服烏金散麒麟竭一兩百草霜一兩元胡一兩當歸一兩男發灰一兩鯉魚鱗一兩肉桂一兩赤芍一兩松墨醋浮煅一兩為末每服二錢空心酒下牡蠣散牡蠣粉二錢川芎一錢茯苓一錢熟地一錢龍骨二錢續斷一錢當歸一錢艾葉一錢酒炒人參一錢五味十粒地榆一錢甘草五分薑三片大棗二枚水煎服參朮膏人參一斤白朮一斤煎成膏子每用三錢白湯下産後小便不利産後小水不通四物湯去生地加赤苓木通又法用炒鹽一撮麝香少許拌勻填産婦臍內外以蔥頭十餘莖縛作一束切片如餅子樣須手指厚先將鹽麝二物納臍中後將蔥餅加於其上用艾炷與蔥餅一樣大灸之待熱氣入腹方止其小便自通矣有大小便俱閉而惡露不行者服行血藥惡露已淨用四物湯黃芩山梔枳殼木通赤苓之類如惡露不行大便瀉而小便閉者但可服五苓散加行血藥如赤芍紅花元胡索等類不可服胃苓湯蓋蒼朮厚朴能止血故也産後衄血産後氣消血敗營衛不理散亂流入諸經不得還元故口鼻黑氣起及變鼻衄因産後虛極變為此症則胃絶肺敗多至不救用犀角地黃湯或可挽回百一犀角生地白芍丹皮水煎服
