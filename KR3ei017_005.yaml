body:
  text: 卷五難産難産生死歌欲産之婦脈離經沉細而滑腹又疼定知半夜應分娩脈法由來載內經大凡臨産應如此産婦安然切勿驚身重寒熱痛頻頻唇甲之色黑復青子死腹中從此驗舌青冰冷母歸陰面赤舌青須細看母活子死定分明唇口俱青白沫出子母俱亡自可憑面青舌赤沫又出母死子生定知真臨症過來俱應驗方知前哲不虛陳難産之症宜服童便磨神仙聚寶丹服之或有不順者用萆麻子肉十四粒硃砂雄黃各五分蛇殼尺許燒灰加麝香一分共為末將水和作一丸用川椒湯淋産婦臍內次將丸藥納臍中用綿紙數層覆其上再用闊布縛住待胎下即去其藥推腸生者若腸不收用新汲水入醋少許三噴其面即自縮而上矣若腸下時須用溫湯洗濕米篩盛之若沾染塵垢及著乾物即不肯上且黏住斷絶而母命不保矣又法將産婦頂心發分開用萆麻子肉搗爛敷於顛頂將腸溫水養之其腸即收則母命全矣又有橫生逆産手足先出者用細針連刺兒手足將鹽擦其刺處即便縮上俗謂討鹽生也有頭胎生曾二三個月隨墮嗣後第二三胎仍前復墮名曰滑胎不可復安矣必須於有胎之後曾有正産一次後無此患矣按紫蘇飲一藥能治臨産驚恐氣怯纍日不下乃妊娠之要劑也壬午年間曾有某室懷孕十月滿足忽然腹中大痛即喚穩婆守候穩婆欲圖大望假意探胎消息將指摘破胞衣水流不止胞水流乾胎元干擱不能轉運日夜無眠痛亦不已約四五日矣邀余往視診其脈六脈離經或曰六脈已散命將危矣余察其舌色鮮紅毫無青色謂曰不妨將臨盆矣或曰胞漿已干有何生理答曰古有急開支河之法即大劑四物人參加入車前五錢柞枝一兩煎湯代水煎服房中穩婆三個議論紛紛或欲早用鉤割以全母命余曰各人不可動手瓜熟蒂落可保子母兩全服過藥後少頃腹中大痛喚人扶掖走動兒即墮地今已十二歲矣臨産臨産歌臨産之時勿易看驀然氣湊目珠翻唇青口噤流涎沫子母雙雙入死關舌色鮮紅唇面黑子存母死片時間面紅舌黑兒難保佛手仍須奪命丹橫逆催生龍蛻散滑胎可救漏胎干死胎欲下芎歸飲更搗務麻腳底攤血入胞中時脹悶上衝心胃死何難朴硝散共紅花酒奪命神丹逐下安産下血逆成血暈清魂急灌命須還血由一倒心無主目暗神昏汗雨漫氣隨血脫多難救桂附參耆大劑堪血衝心悶成狂妄喘促蒲黃不等閒兒枕痛知緣惡露當歸失笑效非凡忽然口噤言顛倒見鬼原非風與寒敗血上衝心血耗妙香散共黑龍丹夫婦人臨産死生反掌若善於救治者實可以起死回生稍不急救多致夭枉救之不得其法藥之不能應手亦莫全其生也將産努力過多兒轉未逮以致胎落於胯不能育者有因子橫子逆而難産者有體肥脂厚平素逸而難産者有子壯大而難産者有年長遣嫁交骨不開而難産者有胞水先破胞內乾澀而難産者有胎死腹中而不下者其腹冷舌黑可驗有胞中積水其腹大異常脈息細弱名曰胞水時醫不識疑為雙胎臨産必去水斗余方産其兒手足必然軟短殘疾蓋水漬其胎故也醫者識此早用去水之藥兒斯無恙矣有兒下地去血太多産下即死者有血奔上而昏暈者有子下而胞不下者有敗血灌滿胞中者如胞不下須行去胞血則自下也有因穩婆取胞誤傷內臟輕則帶疾重則傷命慎之慎之大抵貧賤婦人生育極易者以其勞役胎氣流動故也富貴之家厚養安逸身體肥壯每難生育也脈經曰臨産六至脈號離經或沉細滑若無即生浮大難産寒熱又頻此時急候急於色徵面頰唇舌忌黑與青面赤母活子命必傾若胎在腹子母歸真臨産之時切不可喧鬧選一善熟穩婆或得力使女無使揮霍慌張致令産婦驚恐宜食軟飯稀粥若腹中痛且令扶行或痛或止名曰弄胎不可使穩婆手探尤不可屈腰臥眠如連引腰痛眼前如見火光此是兒轉運須扶掖徐行起若艱難即持物立住須臾直至腰腹相引難以行立然後坐草切勿太早恐兒在腹難以轉動及胞水先破子道乾澀皆主難産若心中熱悶將生雞子一枚打破吞服抱腰之人不可傾斜則兒自然順下若臨事倉皇用力失宜隨有難産之患小兒已出勿令便睡宜閉目而坐少頃方扶上床仰臥立膝勿令熟睡宜頻喚醒切不可以得男為喜喜則傷心恐生紅汗之症亦不可以得女為憂憂則致敗血攻心之患房中常以醋煙燻之以防暈悶血升數日之外不可勉強下床一月之外莫犯房事謹之慎之妊娠臨産有兒湊心不下者其兒手必捧母心多致母子俱亡必用藥引入心分解開兒手方得産下蓋兒手捏物最緊藥氣一到其手自軟故曰解開有産後胞衣不下不可視以為細故而忽之多有升至心而死者不可不知兒捧母心兒捧母心者急用豬心血調乳香五錢煮酒送下兒手遂開如胞衣不下用花蕊石一兩硫黃四兩入罐鹽泥固濟煅過為末童便酒調一錢即下胞衣未下時産婦將己發推入口中似欲作嘔勢胞衣即下矣有胞水放干兒不肯下者急以大劑四物加車前一二合流水煎頻頻服之兒即隨水而下此急開支河法也虛者加人參胞衣不下準繩云胞衣不下用瓦油盞烘熱仰放産婦臍上令男人以腳抵住油盞其胞即下乃鄉村之法果驗交骨不開交骨不開有因元氣素弱胎前失於調養以致氣血不能運達而然用加味芎歸湯加柞樹枝一兩大劑服之外以麻油調滑石末塗入産門交骨漸開達生散即紫蘇飲胎前之妙劑催生之良方大腹皮三錢人參紫蘇陳皮歸身各五分白朮白芍各一錢炙草二錢加黃楊頭七個枳殼砂仁五分青蔥五莖水煎服此方補中行滯能下死胎胃苓湯蒼朮厚朴廣皮白朮茯苓各一錢半豬苓一錢甘草六分官桂五分姜一片水煎防風通聖散防風荊芥麻黃山梔赤芍大黃朴硝甘草桔梗川芎歸身滑石薄荷黃芩白朮石膏連翹黑神散治胞衣不下熟地歸尾赤芍蒲黃肉桂炮姜甘草黑豆半升炒童便沖服神仙聚寶丹熟地川芎乳香五靈脂琥珀當歸硫黃花蕊石良薑黑龍百草霜奪命丹治子死腹中不下桃仁赤芍官桂茯苓丹皮養胃湯治惡阻當歸白朮白芍茯苓半夏藿香砂仁陳皮神麯香附姜三片大棗二枚五積散見前安胎飲見前苦楝丸苦楝打碎酒浸茴香炒當歸等分共為末酒糊丸妙香散見産後清魂散見産後難産縮胎法丹溪曰世之難産者往往見於鬱悶安佚之人富貴豢養之家若貧賤辛苦者無有也古方書只有瘦胎飲一論而其方為湖陽公主作也實非極至之言何者見其有用此方者其難自若豫表妹苦於難産後遇胎孕則觸而去之豫甚憫焉視其作為惟勤於針指構思旬日忽自悟曰此正與湖陽公主相反彼奉養之人其氣必實耗其氣使平和故易産今形肥知其氣虛久坐則氣不運必氣愈弱兒在胞胎因母氣不能自運耳當補其母之氣則兒健易産矣令其有孕至五六個月來告即與全方紫蘇飲加補氣藥與數十帖果得男而甚快遂以此方隨母形色性稟參時令加減與之無不應者因名其方達生散白朮散治子腫白朮一錢姜皮陳皮茯苓皮大腹皮桑皮各五分為末米飲調服竹葉湯治子煩淡竹葉麥冬肉黃芩人參茯苓防風知母水煎服參朮飲治轉胞當歸熟地川芎白芍人參白朮陳皮半夏甘草姜三片水煎參朮膏轉胞屢驗人參二錢半白朮二錢黃耆錢半茯苓一錢陳皮一錢桃仁一錢炙草五分用羊豬胞煎湯代水婁氏十産論一曰正産婦人懷胎十月滿足忽腰腹作陳疼痛相次胎氣頓陷至於臍腹痛甚乃至腰間重痛穀道挺進繼之漿破出血兒子遂生此名正産二曰傷産婦人懷胎未産一月之前忽然臍腹疼痛有如欲産之狀仍卻無事是名試月非正産也但一切産母未有正産之候即不可令人抱腰亦不可令産母亂動用力若兒身未順才方轉動便教産母虛亂用力使兒錯落忽橫忽倒不能正生皆緣産母用力未當用力之所致也直待兒身順臨逼産門方始用力一送令兒下生此名傷産三曰催産孕婦欲産漿破血下已見是正産候但卻未服藥不生即可服催生藥試之或有經及數日而不産則産母困倦亦可服藥助産母之正氣令兒速生此名催生四曰凍産乃冬月寒冷産母經血得冷則凝以至兒不能生下此害最深若冬月生者下部切不可脫棉衣並不可坐臥寒處當滿房著火常有暖氣令産母背身向火令臍下腿膝間嘗暖血得熱則流行兒便易生名曰凍産五曰熱産時當夏令威焰酷烈産婦要溫涼得所亦不恣意取涼傷損胎氣又不可房中人多熱氣逼襲産母使産母血沸發熱頭疼面赤昏昏如醉乃至人事不省此名熱産六曰橫産兒先露手或先露臂此由産母未當用力而先用力故也兒身未順用力一逼遂致身橫不能生下當令産母安然仰臥然後推兒徐徐先推其手令人直上漸漸逼身以中指摩其肩推上而正之或以指攀其耳而正之必須産母仰臥以便推兒正之候其兒身正煎催生藥一盞服之方可用力令兒下生此名橫産七曰倒産産母胎氣不足關鍵不牢用力太早致令兒不能回轉便直下先露兒足當令産母仰臥令穩婆推其足漸漸入內不可令産母用分毫力亦不得令其驚恐務必安慰使兒自順名曰倒産八曰偏産兒身未正産母用力一逼致令兒偏柱左腿或偏柱右腿故頭先露偏柱一半不能生下當令産母仰臥次令看生之婦輕輕推兒近上以手正兒頭令看生之人以綿烘熱裹手於穀道外旁輕輕推兒頭端正便令産母用力一送兒即下也此名偏産九曰礙産兒身已順而露正頂不能生下蓋因兒身回轉臍帶攀其肩因此露頂而不能生下當令産母仰臥令看生之婦輕輕推上徐徐引手以中指按兒肩下撥其肚帶仍須候兒身正順方令産母用力一送兒即生下此名礙産愚按大凡橫産倒産偏産礙産四法若非穩婆精良妙手不可依用此法恐恣其愚蠢以傷人命也今世之倒産者往往隨其倒足生下名曰踏蓮花生並無後患子母雙全不必依前條推足上法亦可如礙産者往往肚帶有纏在兒頭頂上而兒頭自出在産戶外穩婆以指撥其肚帶從兒頭頂過下之者又有肚帶纏住頭頂一匝而兒與胞衣一齊同下者倘漫用前法推入産門轉恐誤事也十曰坐産言欲臨産時高處系一手巾令産母以手攀之輕輕屈足坐定令兒生下非坐在物上也此名坐産昔有趙都運恭人每産則大腸先出然後則産産後則大腸仍露甚為苦之名曰盤腸生醫不能療偶在建昌得一良法而可收之用醋半盞新汲冷水七分調勻噀産母面每噀一收縮三噀收盡是良法也産母腸不收用香油五斤煎熱盛盆候溫坐油盆上約坐至半時以皂角末次入鼻中嚏作立收斗門方又法用半夏末搐鼻中則腸立收上又紙捻蘸香油點燈吹滅以煙燻産母鼻中腸亦立上丹溪曰胎前毋滯産後毋虛産後一切皆不可發表産後不可早用白芍以其酸寒克伐生髮之氣故也大凡産後不可食物過多恐成積滯若未滿月不可強起離床不宜多言喜笑及驚恐憂惶悲思怒惱不宜久坐久立及作針工恐滿月之後即成蓐勞並油膩魚肉之類皆不可犯凡産後百日之外方可交合不爾百病滋長慎之凡婦人患風氣臍下虛冷莫不皆早行房之故也或曰新産之婦好血已虧汙血或留彼黑神散非要藥乎答曰至哉坤元萬物資生理之常也初産之婦好血未必盡虧汙血未必盡積臟腑未必寒何以藥為飲食起居勤加保護何病之有誠有汙血體怯而寒與之幾劑亦自簡便或有他病當求病起何因病在何經對症投劑何用雜藥亂投誠有性急形瘦易怒火多者夏月坐蓐時行火令薑桂皆為禁藥至於保護之法尤為悖理肉汁發陰經之火易成內傷之病先定有訓戒何胡為羊雞濃汁作糜而又服當歸丸四順理中丸之類雖是補藥並是偏熱若臟腑無寒何處消受若夫兒子初生母腹頓寬思食雞子而不思雞子難化輾轉生病每見産母無疾者卻去黑神丹不可與雞子肉食且與之白粥乾菜間以少些白鯗半月方與別物大能養胃卻疾彼富貴之家驕恣之婦卒有白帶頭風氣痛膈滿痰逆口乾經事不調等症皆是陽盛陰虛之病天生血氣本自和平又烏知其有此等謬迷有以兆之耶
