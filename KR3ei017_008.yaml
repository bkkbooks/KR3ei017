body:
  text: 卷八産後無乳婁氏曰纍經産而無乳汁者亡津液故也須服滋補之藥以動之若雖有乳汁而又不甚多者須服通經之藥以動之仍羹臛引之蓋婦人之乳資於衝脈與胃經通故也大抵婦人素有疾在衝任經者乳汁少而其色帶黃所食之子怯弱多病又曰乳汁不行有氣血盛而壅閉不行者有氣血弱澀而不行者虛當補之實當疏之疏用通草漏蘆土瓜之類補用盅乳粉豬蹄鯽魚之屬雲臺立效方元米半合萵苣子半合生甘草五錢上煎汁一升去渣分作三服乳汁立下湧泉散治婦人乳汁絶少瞿麥穗麥冬龍骨山甲炙王不留行上為細末每服一錢熱酒調下後服豬蹄湯再用油木梳於左右乳上各梳二三十梳每日三服胎前乳汁自出者謂之乳泣又名乳注生子多不育産後乳汁自出蓋是體虛宜服補藥以止之亦有乳多急痛而出者溫帛尉之漏蘆散亦可漏蘆散漏蘆二錢半蛇殼一條栝蔞十隻為末酒調服二錢産後崩淋帶下産後崩淋及赤白帶下者皆因七情內傷或下元虛弱王叔和曰始病血崩久則血少亡陽故白滑之物下流不止是本經血海先枯津液消亡乾涸不能交養筋骨用藥之法須以本部行經藥為引為使用辛甘油膩之物潤其枯涸而滋益津液以大辛熱之藥裨補陽道生其血脈以寒苦之物瀉其肺以人參補之微苦濕藥佐之以治此症之大法也崩中者由臟腑傷損衝任二脈氣虛血虛之故此二脈為經里之海氣血之行外循經絡內榮臟腑腑因衝任二脈之氣傷虛極不能約制厥經之血故忽然而下謂之崩中暴下治當大補氣血之藥舉養脾胃微加提鎮墜下心火之藥宜補心瀉火湯血自止矣凡淋帶之症俱是痰積流下滲入膀胱而成也治宜升提以提其氣下陷用二陳加二術肥人多濕痰加半夏南星炒黃柏川芎椿皮青黛瘦人多火加黃柏椿皮海石滑石蛤粉赤白兼下加炒蔓荊子末酒調下二錢産後陰脫婁全善曰産後陰脫者因産時努力太過以致陰脫狀若脫肛陰戶挺出逼近腫痛舉重房勞皆能致此清水續續小便淋漓用硫黃烏賊骨各五錢五味一分為末敷患處兼服參耆歸草升麻等補藥自愈丹溪治一婦人三十餘歲生女二日後産戶一物如手帕下有帕尖因思之此由胎前勞乏傷氣或肝痿致此卻喜血不甚虛其時歲暮天寒恐冷干壞了急與參耆一錢白朮五分當歸一錢半升麻五分三帖連服之即上得汗遍身乃安但下而沾席處乾者落一片蓋脂膜也食進能眠診其脈皆澀左略弦視其形卻實與白朮白芍各五分陳皮一錢薑一片連三四服遂安又一婦人産子後陰戶中有一物如合鉢狀有兩歧其夫求治豫思之此子宮也必氣血虛弱而下墜也遂用升麻黃耆大料二服與之半日後其夫復來曰服二貼後覺一聲響視之已收陰戶訖但因經縮幹著席破一塊如掌心大黏席其妻在家哭泣自傷恐損破不能復生豫思之此非腸胃乃糟粕也何駭之有肌肉破尚可復完若氣血充盛可以生滿遂用四物湯加人參與百帖三年後始復生子産後玉門腫痛凡産後陰腫下脫內出玉門不閉用石灰一升炒極熱湯二升投灰中俟溫冷澄清坐水中以浸玉門斯須平復如故産後玉門腫痛用海螵蛸去甲研細末用雞子殼調塗其腫立消産後玉門不斂此氣血不足也宜補中益氣湯倍加升麻産後脅痛産後脅痛仍頑痰瘀血也左痛為痰右痛為血宜補中益氣湯頑痰在左加白芥子瘀血在右脅加枳殼柴胡産後陰癢産後陰癢或腫痛此濕熱也宜藥湯熏洗荊芥白芷白礬川椒杏仁桔梗細辛煎湯熏洗亦有産後陰癢用蛇床子一兩白礬二錢煎湯頻洗其癢自止産後下血成片産後忽然下血成片如崩狀此因氣血大虛脾胃又弱以致氣血攻於脾胃胃氣不順則成此症此營衛衰敗也當和血理氣服四物止經湯熟地白芍當歸川芎柏葉茯苓香附阿膠蒲黃白朮棗仁陳皮人參甘草産後尿胞墜下産後偶取重物致尿胞墜落在外不收此氣弱血冷移取重物努力而致傷勝因而墜下不收或三四月或半年一載不能還原者宜服收陰散人參白朮甘草肉桂枳殼升麻吳萸沉香加四物湯絶産不育産婦生育艱難意欲斷産非細事也或因生産不順每育則鉤割或因不正或娼尼等不願孕育而欲絶胎者每以毒藥斷之殊不知産育雖斷而其受病更深也智者鑑諸三白丸治婦人不生子白芨白蘞白茯苓秦艽厚朴當歸吳萸人參肉桂乳香各四錢為末蜜丸如桐子大每服三十丸空心酒下産婦乳裂産婦乳裂流脂疼痛用秋冬繃拆茄子瓦上煅灰白蜜調敷産後陰戶翻出産後陰戶翻出腫痛用石灰煎湯先熏後洗産後脫髮産後脫髮用申薑二兩薔薇根一兩煎湯刷之即不脫矣附婦人雜病諸方眉毛脫落硫黃一兩研細末醋調塗眉間眉毛漸出又方用白芥子三錢半夏三錢為末生薑汁調搽即出女人赤鼻枇杷葉五錢去毛山梔四錢苦參五錢蒼朮五錢米泔浸共為末每服一錢五分白滾湯下其赤漸退女白癜瘋白附子五錢雄黃五錢共為末薑汁調白芥蒂蘸藥擦之其瘋漸退女人面上赤疵常以銀扁烘熱日日揩之久久自化女人髮鬢墮落桑皮一兩柏葉一兩水煎七八沸去渣頻洗婦女頭髮黃赤用生柏葉末一升豬脂一斤搗爛和丸如彈子大每用以布包一丸投米泔中化開沐之其發漸黑婦女齒疏用蘆甘石寒水石等分研細每早擦之忌用牙刷久久自密女人手裂用白果嚼爛夜夜塗之甚妙女人時流清涕用蓽茇研末吹之即止女人腳拆用生羊腿骨內水將雞羽蘸之潤開拆處久久自合永不再發女人汗癍硫黃雄黃蜜陀僧白附子鉛粉滑石光粉各等分為末先將皂莢煮爛擦後用藥末唾津和塗之婦人乳癬癢不可忍用銅碌輕粉為末菜油調敷其癢漸止女人鼻淵用藕節川芎各等分炒研為末每服二錢米飲調下女人腦漏不止用胎髮一兩將絲綿包煅存性加入冰片麝香辛夷共為末吹入鼻中七八次即愈手足繃裂洗方麻黃五錢當歸五錢苦參一兩蛇床子五錢蕪荑一兩靈仙八錢防風五錢荊芥五錢皂莢一兩豨蘞一兩煎湯熏洗雞眼疼痛雄雞肝一具竹片剖露入百草霜拌勻濕草紙煨熟食之雞眼軟而自脫女人鵝掌瘋蕪荑一兩五倍子一兩共為末醋調敷七日不可下水聽其自脫二次全愈老婦齒敗口臭用川芎含口中即不臭解頤脫臼不止用生南星為末薑汁調敷兩頰叉一夜即止女金丹治婦人諸病金華香附十五兩分作五宗每宗如法五制三兩蓬朮艾葉各一兩半米泔浸三兩元胡川芎各一兩半煎湯浸三兩三稜柴胡各一兩半醋浸三兩紅花一兩半烏梅三十枚鹽水浸三兩當歸三兩煎湯浸春浸五日夏浸三日秋浸七日冬浸十日曬乾為末晚米飯為丸如桐子大臨臥酒下如腹痛加檳榔青皮各一兩半保産神方當歸川芎各一錢半厚朴七分枳殼三分炒黃芩八分艾葉八分絲子一錢半炒川貝一錢羌活五分荊芥八分白芍一錢二分甘草五分孕婦六七個月即可服加薑三片水煎女子腋臭用蚶子殼一對將蜘蛛一個填入扎緊瓦上煅加雄黃七分生礬七分硫黃五分密陀僧一錢俱煅存性研細末隔夜更衣次早先將滾水洗待乾即本人自便調擦立驗又方用青木香二兩醋浸夾於腋下濕者研末摻之脫骨湯女子纏足少痛杏仁二錢桑皮四錢朴硝五錢乳香一錢水煎置足於湯熏洗十餘次纏則不痛也換肌散治婦女瘡疥久不愈肌膚粗裂土茯苓銀花荊芥熟地制首烏共為末蜜丸大內瘡藥方大風子肉二兩冰片三分麝香三分細辛二錢白芷二錢滑石五錢安息香五錢藝香三錢蘇合油三錢川椒三錢共為細末以油核桃肉三兩搗和為丸浴後擦之陰吹仲景曰陰吹者胃氣泄陰吹而正喧此穀氣之實氣從溺處而泄也治宜膏發煎豬膏八兩亂髮雞子大三枝上二味和一處煎之發消藥成服之病從小便出交腸仲景曰交腸乃大小便易位而出也此因醉飽房勞或大怒氣亂真臟氣乖不循常度泌別失職之所致也治宜五苓散或四物湯加海金沙木香檳榔木通桃仁之類陰疝張子和曰婦人脾胃虛寒氣滯不行攻刺心腹痛連胸脅或因瘀血作痛狀如黃瓜在小腹兩旁橫骨端紋中孰謂婦人無疝乎治宜蟠蔥散桃仁當歸湯蟠蔥散青皮一兩五錢釘皮砂仁各一兩三稜檳榔各一兩乾薑肉桂各五錢元胡七錢五分蒼朮五錢甘草一兩上為二劑薑棗蔥煎熱服臍下冷痛加吳萸茴香桃仁當歸湯桃仁二錢歸尾元胡各一錢半川芎生地赤芍炒吳萸青皮醋炒一錢丹皮八分薑三片水煎食前服化氣丸治經行腹痛香附青皮陳皮砂仁木香川芎茴香上為末曲糊丸異功散調理脾胃人參白朮茯苓甘草陳皮水煎服附婦人修飾粉滓面皯爐甘石二兩白蘞十二兩為細末雞子清夜塗旦洗能白口香闢臭白蔻仁二錢北細辛二錢為末睡時含之唐天后澤面法治婦女粉刺黑斑五月五日收帶根益母草紫花者曬乾燒灰以商陸根搗自然汁加好醋和搜灰作餅炭火煅過收之半年方可入面擦之能潤肌去滯蘇頌曰唐天后煉益母草澤面五月五日採益母根苗具者勿令著土曬乾搗爛以面水和成丸如雞子大再曬乾仍作一爐四旁開竅上下置火安藥中央大火燒一炊久即去大火留小火養之勿令火絶經一伏時出之瓷器中研極細無聲收用如澡豆法日用一方寸每灰十兩加水飛滑石一兩胭脂一兩研勻用之一月之後面如美玉太真紅玉膏名女人面脂輕粉一兩杏仁去皮一兩滑石水飛一兩冰片一分麝香少許上為細末蒸過入冰麝再研以雞子清調勻洗面後塗之旬日膚若凝脂悅澤面容冬瓜仁五兩去殼桃花四兩白楊皮二兩為末米飲服方寸匕日三服欲白倍加冬瓜仁欲紅倍加桃花服三十日面白如玉五十日後手足皆白一方用陳皮去白楊皮此宮中嘗服之劑面生痱㾦王瓜根搗汁漿水和勻入冰片少許入夜洗面塗藥百日後肌膚柔嫩痱㾦全除玉容散治婦女面無光彩顏色白而不潤澤香芷五分肥皂一兩細辛錢半甘松二錢半荊芥五錢木賊三錢白丁香二錢杏仁三錢花粉五錢蕤仁五錢藿香葉三錢天蟲五錢山奈錢半陀僧五錢元明粉三錢輕粉二錢硫黃一錢鉛粉一兩蘇合油五錢後入冰片一錢上藥共為細末臨睡吐津調勻擦面過夜次日清早用煮酒一杯沖熱水洗去再拍玉容粉玉容香粉白果洛一升去殼打汁杏洛一兩去皮打汁上甘石一兩水飛研滑石水飛三兩元寸二分蘇合油五錢冰片四分上鉛粉一兩去鉛藥研極細末用泉水漂去黃水後入冰片麝香蘇合油加珍珠末五分再以胭脂水調和收貯臨用加白蜜少許旬日之後面白如脂夫婦不相識也婦人面黑粉滓白石脂二兩白蘞十二兩山奈一兩共為細末雞子清調敷夜塗旦洗渣去面白女人雀斑異授雀斑方用頭生雞子一個打破頂去黃留白加大匹砂一兩研細填入雞卵內上用綿紙封固貯哺雞肚下哺之待雞雛出取先將肥皂打除面上油後用前雞子清塗之其斑漸去一月之後白玉無瑕此方貴妃常用乃西王母枕中方也寶之又方肥皂四兩去核甘松一錢山奈一錢細辛一錢白芷一錢丁香一錢鷹糞五錢上為末棗肉為丸洗面後用藥擦之其雀斑漸除再以玉容香粉拍之則白而嫩亮光彩射人又方鷹糞五錢山楂五錢蜜陀僧五錢為細末將乳汁調和夜睡擦之一月後雀斑盡除加蘇合四錢更妙清早洗去久服身香桂心冬瓜仁松樹皮為末棗肉為丸久服遍身香氣透鼻洗面擦藥櫻桃皮雀卵紫背浮萍牙皂白梅肉研細和勻日日洗面擦之肌膚漸嫩玉容肥皂白元米一升肥皂去皮核四兩天花粉八兩滑石三兩胡桃肉八兩粉葛三兩白丁香一兩真粉三兩橄欖四十個去核北細辛二兩牙皂八兩棗肉四兩蒼耳草搗汁同元米飯和搗為丸如彈子大洗面後擦之四精膏治婦人身澀不滑人乳象精白蜜藕汁各等分熬膏加蘇合油調勻浴後滿身塗之一月之內遍體嫩滑香潤此宮中日用之方也面脂手膏羊乳三斤羊胰子三副搗和每夜洗面塗之清早洗去一月之後手嫩面澤面體黧黑羚羊脛骨一條為末雞子清調敷以米泔水洗之夜塗旦洗三日如素面粗皮皯胰子五具蕪青子二兩杏仁一兩花粉一兩醇酒浸之夜塗旦洗每日用之老者返少少者嫩白令面光澤母豬蹄一具煮汁如膏夜塗旦洗婦老漸嫩如少女人面上瘢痕白蒺黎一兩山梔一兩為末醋調夜塗旦洗疤痕漸脫面黑令白冬瓜一個用竹刀去皮切片勿經鐵器酒一升半煮爛去渣熬成膏夜塗旦洗肌膚漸白
