body:
  text: 卷六産後門婦人産後如無他症不必服藥三日之內但以荊芥炭益母草砂糖煎湯頻頻與飲使惡露下盡自無血暈腹疼之患切不可飲酒及雞子牛羊豬肉之類須以白粥乾菜調理或松江淡鯗蒸熟食之半月方可食鮮肉漸漸加增才免陽盛陰虛之患若去血過多惡露未淨或傷飲食或感風寒或夾氣惱或三日蒸乳皆能發熱增寒身疼腹痛當以意消息不可偏執而用藥也丹溪云産後以大補氣血為主雖有雜症以末治之産後不可發表又不可早用白芍以其酸寒恐伐生氣也慎之凡婦人産後陰血虛陽無所附而浮散於外故多發熱治宜四物補陰血而炮乾薑之辛溫從治收其浮散使歸於陰然産後脾胃俱虛多有過服飲食所傷滯而發熱者誤作血虛則不效矣如遇産後發熱須審問何物所傷有食無食胸膈可有飽悶如惡食泄瀉只作傷食治若發熱而飲食自調者方用補血藥産後血暈因虛火引血上行漸覺昏暈急以鹿角燒灰出火毒研極細末煮酒童便調和灌下即醒行血最快又法用鐵稱錘炭火燒紅以醋淬之令産婦鼻搐之即醒鄭良棟曰新産血暈不省人事大類中風切不可遽以中風治之急服琥珀丸即愈如兒以下地一時血暈昏昏不醒速扶起抱住勿令臥下快與童便灌之如不醒再以燒紅炭投醋中使醋氣透入産婦鼻內即蘇因症用法無不應效産後子已在蓐切不可使之即臥須扶坐片時可也因初産之婦血氣未定恐其血乘虛而上逆慎之新産飲酒大忌乃第一證但服童便為妙他藥苦寒雖屬降下之品卻能凝滯敗血且産後即發熱切不可服涼藥以其伐生氣而血凝也若童便乃人身之元氣所成名曰還元丹惟能降火蓋以人補人之義新産飲食最難克化如赤豆沙雞鴨蛋之類蓋新産暴大下血脾胃甚弱最易成病新産之脈緩滑結實大弦緊鬼來侵若得重沉小者活忽覺堅牢命不存寸口澀疾不調死沉細附骨不絶生請看此候分明記常須念此向心經新生胞衣不下血暈不醒腹中刺痛敗血攻心或眼閉口噤或譫語狂言困頓垂死者以琥珀黑龍丹灌之立效或黑神丹亦可産婦敗血有沖胃衝心之辨不可混治衝心顛狂作亂是也沖胃者飽悶嘔惡是也二者俱屬危症用藥不可不速遲則不救王肯堂曰産後敗血有沖胃衝心沖肺三者皆屬危症用藥不可不速沖胃則嘔沖肺則喘衝心則發狂跳躍急令兩人扶住急宜童便降香沉香當歸煎湯灌下其惡血自下行新血各歸經即時安寧矣皇甫中曰産後敗血停蓄上干於心心氣閉塞故舌強不能言語者八珍散産後內因痰氣鬱滯閉目不能語用明礬一錢為末白滾湯沖服産後去血過多暈悶不醒者芎歸湯産後虛火引血上行血迷血悶暈昏不知人清魂散如不醒以韭菜一二斤搗爛入壺中沸醋傾入壺內覆壺蓋以壺嘴放鼻間熏之即蘇或乾漆燒煙令産婦搐煙如不醒急掐其人中提頂心頭髮灌之以童便薑汁自然蘇醒黑龍丹治産後一切血證及胞衣不下危急之症當歸二錢五靈脂二錢川芎二錢熟地二錢良薑二錢上藥一兩以沙盒盛赤石脂以紙包鹽泥封固炭火煅令通紅火候冷取開看成黑色研細入後藥百草霜五兩硫黃錢半乳香錢半花蕊石一錢琥珀屑一兩後藥與前藥研極細以醋糊為丸如彈子大每服一丸炭火煅令通紅投入老薑自然汁與童便入酒漉出烘乾研細只以此酒下清魂散治血迷血暈昏迷不省澤蘭一兩人參一兩荊芥四兩炙甘草八分每服二錢熱湯溫酒各半盞調服産後血暈問曰新産婦人有三病一者病痓二者病鬱冒三者大便祕結何謂也師曰新産血虛多汗出喜風故令病痓亡血復汗寒多故令鬱冒亡津液則胃燥故大便難産後血暈者氣血暴虛未得安靜血隨氣上迷亂心神故眼前生花甚者令人悶絶不知人事口噤神昏氣冷宜服清魂散即蘇荊芥散治産後血暈精神昏昧荊芥一兩三錢桃仁五錢炒為末滾湯下三錢如喘加杏仁甘草各三錢敗血衝心婁氏曰産後下血多而暈者但昏悶煩亂而已當補血下血少而暈者乃惡露不下上搶於心則心下滿急神昏口噤絶不知人當破血行血丹溪曰婦人産後血暈此乃虛火載血妄行漸覺昏迷以鹿角煅灰出火毒研極細末用童便煮酒灌下即醒此物行血極妙獨行散治産後血暈昏迷不醒衝心悶絶五靈脂四錢一半炒一半生共研極細末溫酒調下二錢即蘇産後鬱冒仲景曰産後鬱冒其脈微弱不能食大便反堅但頭汗出所以然者血虛而厥厥而必冒冒家欲解必大汗出以血處下厥孤陽上出故但頭汗出所以産婦汗出者亡陰血虛陽氣獨盛故當汗出陰陽乃復大便堅嘔而不食者小柴胡湯和之産後如狂喘滿産後血搶心悶如狂喘滿欲絶者蒲黃散惡露不盡心腹痛黑神散惡露不盡兒枕痛當歸失笑散産後忽然口噤語言顛倒如見鬼狀此敗血攻心非風寒邪祟也妙香散或用黑龍丹煅過酒調下蒲黃散治惡露不快血上搶心等症乾荷葉二錢半甘草二錢半丹皮二錢半元胡二錢半生地三錢半銼作二劑水煎入蜜少許溫服黑神散治惡露不盡胞衣不下腹痛不止黑豆炒半升熟地四兩當歸四兩肉桂四兩乾薑炒四兩生蒲黃四兩炙甘草四兩炒白芍四兩共為末每服二錢童便各半盞調服當歸失笑散治産後心腹絞痛欲死及兒枕作疼當歸五錢炒蒲黃五錢五靈脂五錢共為末每服二錢醋調熬成膏子白滾湯下炒香散麝香一錢研遠志肉一兩去心黃耆一兩人參五錢茯苓一兩茯神一兩桔梗五錢甘草五錢木香二錢煨硃砂三錢淮山藥薑汁炒一兩共為末每服二錢開水調服滑胎散治坐草太早努力過多以致難産滑石六錢冬葵子五錢甘草二錢為末每服二錢酒下神應散治橫生逆産胞漿先破此藥如魚得水白芷一兩百草霜一兩為末童便酒調下三錢牛膝湯治胞衣不下臍腹堅痛服此爛下牛膝四兩瞿麥四兩當歸三兩通草六兩滑石八兩葵子五兩水九升煎至三升三次服黃耆湯治産後去血過多自汗不止炙黃耆二錢白朮一錢炒防風一錢熟地二錢牡蠣錢半研煅茯苓一錢麥冬五分甘草五分大棗二枚水煎服茯神散治産後心虛怔忡不定神思不清人參一錢茯神八分甘草一錢山藥一錢當歸一錢肉桂五分遠志肉一錢生薑五錢大棗二枚水煎服當歸羊肉湯治産後寒熱自汗肢體疼痛名曰蓐勞諸藥無效者當歸七錢人參七錢黃耆一兩生薑五錢羊肉一斤煮汁五大碗入藥煎四碗作六服腹痛下血胃虛嘔逆砂仁二錢炒研末酒調下或佛手散血虛發熱産後血虛發熱歌産下嬰兒血氣空絲毫觸犯便傷營倏然致疾如山重不與尋常一樣同去血過多因發熱炮薑參朮與川芎陰傷作熱心煩悶自汗黃耆可奏功噁心嘔逆傷脾胃抵聖湯醫腹脅膨歸耆止汗除身熱不愈當歸取效崇風中愈風湯立驗茯神散子治怔忡諸風痿痹筋搐搦時世名醫認血風乍見鬼神由血耗調經散服起疲癃中風口噤牙關閉拘攣身張似角弓此是血虛筋瘛瘲舉輕古拜配歸芎産後經來因適斷感於異症在其中手牽足搐牙關緊昏胃柴胡視聽聰陰虛發熱增寒證晝日清明夜覺凶加增四物神功大一服能令病脫躬胞中誤損成淋症參朮煎膏溲自通浮腫必須分水道憂思鬱結在寬胸痢初化滯香連芍積久須當用胃風初感寒邪微發表熱邪不解用黃龍燥煩實熱芩連理渴甚人參白虎從熱泄柴苓除半夏便難議與大柴攻汗多表弱宜行桂里弱中虛用理中發表內攻須帶補勿行猛浪內傷營小便淋漓行時痛但用茅根可治癃泄瀉胃苓湯可用寒加肉果桂薑同若因熱瀉並腸垢薑炒黃連佐木通氣血大損病夫産後氣血大損即易産力壯者尚有感疾為終身之患産母不可恃健不行保重勞碌以損其營多食以傷其胃外感六淫之邪內受七情之氣為患莫測古云産後勿犯絲毫感病重於山嶽信夫或惡露未淨而發熱作疼真元不復而痿頓為勞比比皆然也故産後諸疾先以大補氣血縱有他疾以末治之或欲祛邪必兼補劑殊為切當若以峻劑攻之再損氣血危可立待或惡露當去者亦須急去故生新溫養為主斯得其正也舉輕古拜散治産後中風荊芥炒燥為末每服二錢豆淋湯調服産後脈法脈經曰婦人新生乳子脈沉滑小者生實大弦急者死又曰婦人生産之後寸口脈弦疾不調者死沉細附骨不絶者生婦人産後因中風傷寒發病喘鳴而肩息脈實而浮緩者生小緊者死丹溪曰胎前脈細小産後脈洪大皆死症也又曰産前當洪數既産而洪數如故安得不死脈經曰産後緩滑沉細皆宜實大堅牢澀疾俱危産後蓐勞婦人新産後自汗肢體痠疼虛眩無力者名曰蓐勞當歸羊肉湯産後氣血大虧失於調理自汗發熱虛羸飲食不化時咳發渴者人參鱉甲散發寒熱石子湯鄭良棟曰産後蓐勞虛損頭痛氣短小腹脹痛而寒熱者增損柴胡湯主之葉盛公曰産後蓐勞緣生産久坐多語運動用力致頭目四肢疼痛寒熱如瘧宜白茯苓散人參鱉甲散治産後蓐勞寒熱如瘧鱉甲炙一兩人參五錢肉桂五錢桑寄生五錢當歸五錢茯苓五錢白朮五錢大熟地五錢桃仁五錢麥冬五錢續斷五錢牛膝一兩五錢黃耆炙一兩共為末豬腎一對去膜生薑一片水二盞棗三枚煎至一盞入前末藥二錢蔥白三寸烏梅半個荊芥五穗再煎數沸去渣空心服石子湯治産後虛羸寒熱自汗氣促等症豬腰子一對去膜竹刀切碎香菌二兩蔥白一兩白芍二兩上藥分作兩帖每用水三升半勻三服白茯苓散茯苓一兩當歸川芎白芍肉桂黃耆人參各五錢熟地一兩先以水二盞煮豬腎再加薑二片棗三枚入藥五錢去渣溫三服增損柴胡湯柴胡半夏人參川芎橘紅甘草水煎服抵聖湯治産後惡露不行敗血入於脾胃赤芍一錢半夏一錢澤蘭一錢陳皮一錢人參一錢甘草七分薑三片水煎服産後胞衣不下産後胞衣不下為血入胞中上衝心胸氣血脹悶不出欲死必須逐其血用紅花茜草酒煎服或朴硝散甚則奪命丹如再不下臍堅脹急痛欲死者牛膝湯努力傷胎妊娠努力跌僕傷胎腰腹疼痛或胎上搶心去血膠艾丸或從高墜下或努力被重物所壓觸傷胎氣腹痛下血胃虛嘔逆砂仁二錢炒為末酒調下或佛手散胞衣先破胞衣先破之由有二或因母體素弱氣血兩虛胞衣故薄兒身轉動隨觸而破有因兒未轉動坐草或早用力過多以致胞破如已破久則血水乾産路遂澀兒難下也急用大劑加味芎歸湯加熟蜜一兩助氣而兼潤滑自當兒即順下婁全善曰胞衣不下惟花蕊散取效獨妙若鄉居藥肆倉卒無之今採得胡氏一法甚妙産訖胞衣不下稍久則血流胞中為血所脹上衝心胸喘急疼痛必致危篤若有此患宜急斷臍帶以少物繫帶必用力牢固系之然後截斷使其子血不流入胞中則胞衣自當痿縮而下縱淹延數日亦不能有害惟以産母心懷安泰終自可下纍試有驗花蕊散治産後敗血不盡血迷血暈惡阻敗血奔心胎死腹中胞衣不下至死者但心頭稍緩急以童便調一錢服之取下惡血或如豬肝産婦從此可無血氣血風之症矣如膈上有血亦化為黃水即口中吐出或從小便下也牛膝湯牛膝瞿麥各四兩當歸三兩通草六兩滑石八兩葵子五兩上藥㕮咀為末以水九升煎至三升分為三服
