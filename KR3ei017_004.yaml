body:
  text: 卷四妊娠中風妊娠中風歌中風惡候告君知眼合肝兮手撒脾心絶口開肺鼻鼾腎家將絶定遺尿妊娠手足搐搦忽然不省人事角弓反張狀如中風者子癇也宜服砂仁湯倘胎前無故卒然悶到在地或有不識誤以中風斷之謬矣此兒暈也名曰子懸須以安胎調氣治之紫蘇飲加砂仁川貝茯神雖至將産仍服紫蘇飲為妙有胎前發喘乃胎不安而冒風也用帶須蔥白二十莖煎湯服之即愈蓋蔥能發散而又安胎也若因傷食而喘者紫蘇飲衝入童便加砂仁煎服舍此無別藥也若胎氣不和湊上心腹以致胸膈飽悶喘急疼痛此子懸也宜紫蘇飲此藥有安胎止墮之功如胎前偏正頭風川芎調茶服主之妊娠感冒四時風寒霍亂吐瀉者藿香正氣散主之凡胎前傷暑與霍亂治法同如胎前瘧疾惟養榮湯一方孕婦發厄氣逆者用紫蘇飲亦有胎死腹中以致氣侵上而厄者下死胎而厄自止矣不可不知孕婦傷食以紫蘇飲加神麯楂肉砂仁麥芽如兼吐瀉用養胃湯有孕無故悲泣不止如有鬼物以憑之此名臟躁非大棗湯不愈有妊娠忽然耳聾昏聵者氣血不足也用十全大補湯目赤腫者四物湯加黃連遍身拘急痛無定處夜不得臥眼花昏黑者胎氣使然宜服紫蘇飲妊娠傷寒妊娠傷寒歌傷寒頭痛連百節氣急衝心溺如血身熱發點紫黑青壯熱不止致胎滅嘔惡不止與心煩腰背項強腦痛裂六七日來燒腹中小便不通大便結妊娠染表症傷寒者當用帶須蔥頭湯服之出汗即愈不可輕用發表藥若誤用之其胎必墮且母命難保戒之慎之胎前瘟疫與傷寒同孕婦傷寒咳嗽宜二陳加薄荷白朮川貝泄瀉者胃苓湯去參俟脾胃實後治嗽可也即參蘇飲亦可服蓋風藥最易動胎反為不美故胎前傷寒身熱咳嗽者惟以帶須蔥白煎湯服之大能安胎順氣若胎不安煎砂仁湯服汗多服參蘇飲乾嘔紫蘇飲去參加茯苓吐血止血丸或二陳加黃柏知母楂炭白朮如氣血兩虛八物加黃柏知母妊娠跌僕妊娠跌僕歌懷胎跌僕無輕重遂致傷胎在腹中已損包胎血上逆衝心悶痛母魂傾妊娠跌僕或受傷重者服活血藥又恐傷胎不服則傷不能去當何法以治之曰必先辨其胎之死生如腹冷舌青者子死也以香桂散下之若未甚分明以佛手散探之如胎傷者立即墮下胎無恙者其痛立止但痛止之後尤須視傷之輕重下藥輕者童便酒入活血藥飲之血活則傷去隨以紫蘇飲加童便砂仁緩緩服之重者只治其傷勿顧其胎也血行胎下母命保矣服紫蘇飲加枳殼童便砂仁尤妙有孕婦胎前衄血産後多不吉血以養胎不宜走泄故也服紫蘇飲加黃芩自愈更有口中見血及大便下血者尤忌妊娠心腹痛叔和心腹急痛歌心腹急痛面目青冷汗氣促命必傾下血不止胎衝上心腹冷悶定傷身妊娠腹痛而見血者名曰胎漏至産即愈生子不實也紫蘇飲加陳皮砂仁若胃口痛甚用指迷湯或養胃湯亦有孕癰者何以辨之服安胎飲消食理氣之藥俱不效但臍近下處腫痛發光者即腹癰也因孕婦生之名之曰孕癰宜十補托裡散此藥補而不礙胎其次千金托裡散亦可有臍下冷痛腹脹小便頻數大便滑泄緣正氣虛弱過吞生冷所致宜安胎飲加枳殼及和氣之藥如小腹痛須察其脈若可安紫蘇飲安之不能安則用活血行氣之藥其內傷甚者下之若血結不下必腹中㽲痛服金屑散或宿食炫癖氣血瘀痛蔥白散主之一切血痛肉炙散白朮煎腰痛甚者腎虛也其胎多墮宜急服安胎飲以固其胎復不寒紫蘇飲可加黃芩若胎不時轉動如腰腹痛者亦宜安胎飲脅肋痛孕婦脅痛甚者其說有三或因哭泣或因忿痛或因內傷如內傷者現有胎不可用行傷藥只宜童便酒或紫蘇飲加白芍當歸砂仁人參童便煎服亦足以固胎或曰脅痛非芥子不能達柴胡枳殼亦可用如背痛者氣滯而不運也宜紫蘇飲妊娠口乾煩悶不得臥者名曰子煩紫蘇飲主之又有口舌生瘡咽喉腫痛者切不可用防風通聖散有孕婦未産而乳汁先下者名曰乳泣生子多不育有兒在母腹中啼哭不須服藥用黃豆打番招孕婦細細拾之其哭自止子腫子腫危殆歌子腫傷肝唇定黑缺盆平也必心傷背平傷肺脾臍凸腳背平時腎病深妊娠浮腫其說有二蓋胎前患水腫者少而患胎氣者多乃氣病也名曰子腫紫蘇飲主之若小便不利腹脹者水腫也紫蘇飲加澤瀉車前白朮治之三焦無病者加山梔黃芩利小便甚捷如孕婦浮腫上半身者宜發汗下半身者宜利小便上下俱腫汗利兼施服藥腫退而脫身者不必再藥凡婦人懷孕宜別室安睡常使身心清淨不得再犯房事夜睡須左右轉換使小兒左舒右安肢體活動臨産自然快便生子亦聰明少疾背有一醫宿店值店婦生産數日不下下體甚冷急以椒橘茱萸乾薑良薑等煎濃湯熏洗臍腹産門等處氣溫血行而遂産胎漏胎漏歌血下如同月水來漏干胞血必傷胎胎傷妊娠須憂慮急賜靈丹救得回只緣欲火房勞損非是尋常虛漏胎蓋胎之漏者必有因而來或誤吞動胎物被熱毒所侵或房勞而傷損損輕則漏亦輕損重則漏亦重血盡而胎死或因母病而胎動者病治而胎自安或胎不堅固而母病者胎安而母自愈矣又有值經期而見血每月一至名曰漏胎宜服安胎飲或紫蘇飲加黃芩白朮阿膠砂仁自然無事亦有傷胎氣而下血不止宜奪命丹胎未損者服之可安已損者服之即下胎前雜證孕婦卒然不語名曰啞胎不須服藥産則能言矣蓋聲出於腎胞絡貫腎故不能言也經曰九月而啞十月當復便是妊娠譫語用四物湯倍加白芍當歸去生地合二陳加山楂薄荷薑汁治之孕婦舌青者子死腹中也用麝香五分肉桂三分為末煮酒調服如雙胎一生一死亦宜此方因母患症熏蒸其胎致兒灼死死兒著冷不能自出或用黑神散之類以暖其胎胎自下矣孕婦小便頻數名曰子淋服內補湯立效小便不通者乃胎下墜而壓膀胱名曰轉胞宜補中益氣加車前有內傷者乃血鬱不去今之梗痛是也妊娠大便祕結乃血枯氣閉也四物湯加枳殼桃仁孕婦水瀉宜分別而治之忌理中五積散因有乾薑玉桂也傷食瀉者養胃湯加消食藥有傷生冷而瀉者亦用養胃湯加木香火瀉者香薷飲夏月暴注下迫者是也暑瀉者胃苓湯加香薷氣虛作瀉者腸鳴而不痛水穀不化者是也補中益氣湯或四君子湯胎前血瀉胃苓湯加木香砂仁或紫蘇飲加神麯澤瀉黃連胃口發飽夾痰嘔逆者忌用參連胎前産後痢載痢證匯參故不贅懷孕五六個月或七八月胎忽亂動兩三日間或痛或有水下但腰不甚痛是胎未離經名弄胎又曰試胎胎水有無俱不妨但直身坐臥行立不可驚憂逼迫以致誤事二者俱非正産必因觸犯所致凡孕婦五六個月或三四個月常要緊束其身勿令胎放肆又不可飲酒常沐浴達生編云小産當慎三五月而墮者謂之小産此因臟腑損傷胞系腐爛以致墮胎此比之大産更甚大産瓜熟蒂落本無足慮尚有多少艱難何況損傷胞系而墮乎輕視小産每致殞命須倍加將息宜服補血養氣去瘀生新之藥世有服落胎之藥者害莫大焉此丐戶穩婆所為醫者斷無此事也催生之說自古相傳然瓜熟蒂落何必催也催之非但無益轉或有害有用兔腦丸者有用千年蒕者有用催生石者有急性子者有筆頭灰者有萆麻子搗爛塗足心者用之多有不驗徒增繁擾嘻平時失於調護任意行房以致難産頻以催之又何濟乎此愚夫愚婦之所為也兒在母腹男女有別男子負陽背陰女子負陰背陽在腹中亦然男向於內雙手傾捧母心女向於外居母心下兩手自捧頭面而背母足居下至臨盆時倒轉而順出矣若産母側臥致兒倒運不轉即有橫生逆産之患故坐草切不可太早須再三令人扶掖運動方免前禍不知此理徒歸産母之氣血不足豈不誤哉然亦有臥而産者必令仰臥平正使産門虛而不礙可也臥而能産惟血氣充實者能之若不坐不臥無故頓住而難澀也力可委罪於氣血不足耳醫者宜鑑諸孕婦臨産之月胞水未破而血先下者此乃胎傷非産也宜八物湯與安胎飲治之若胞水已破此欲産也用紫蘇飲以生其血滑胎之藥須胞水破痛陳急十月滿足者方可服若胞水未破腹痛未甚者雖十月滿足恐未坐草只服安胎飲或紫蘇飲白芍換赤芍當歸用尾去人參加薑蔥水煎入童便一杯忌用桃仁活血之藥胞水已破兒即墮地謂之鋪蓐生産最快利如胞水已破兒不下者謂之試水此産反遲有停一二日而産有服安胎飲而水止痛定至五六日而方産者切不可於破水時即用穩婆動手令胎婦費力痛苦多致受纍胎纍日不下者宜先氣血助其胞水佛手散或紫蘇飲臨蓐先放紅水致兒干擱與行船無水同宜紫蘇飲以生其氣血如臨蓐腰腹俱痛不可用穩婆輕易探候即胞水已破腰痛已極止當令孕婦扶掖走動則生育自然順也至於橫生逆産之患皆因先動手故也其臍帶繫於命門兒將育時兩手洗蕩使臍帶脫落然後得出安得不痛即所謂瓜熟蒂落是也
