body:
  text: 卷三廣嗣論夫陰陽交媾當經盡之後無有不成胎者惟男氣不足女血虛寒故二氣不交徒施不聚世之無子者曾不問自己臟腑之虧但以澀清壯陽之劑誤為生子之良方傷天地之和即或有孕者無非熱藥偶成因貽毒於子女故雖得而不實也醫之上工因人無子著論立方男以補腎為要女以調經為先而又參之補氣行氣之說究其盈虧審而治之夫然後一舉可孕天下之男無不父女無不母矣余考之上古男子三十而娶女子二十而嫁故所生子多壽今人未滿十六歲而御女女子未滿十四歲而嫁婿陰氣早泄未全而傷未實而動所以今人不如古人壽設或用藥不可混治必察實男子所虧女人經候或有崩漏帶下必難受孕男子不育必有陽脫痿弱精冷而清淡或陽痿不射故女以調經為先男以補腎為主也服藥之後又宜清心寡慾使我之本原先壯然後識日之奇偶施之而不孕者未之有也褚澄氏曰男女交合陰血先至陽精後沖而成男陽精先泄陰血後沖而成女此一說也東垣云經水才斷一二日血海始淨交合者成男四五日後血脈已旺交合者成女此又一說也顧或有經始斷而交合生女經久斷而交合生男者亦有三四五日以交合無孕八九日以後交合有孕者獨何歟俞子本選廣嗣要略云實陽能入虛陰實陰不能受虛陽即東垣之見也又謂陽微不能射陰弱陰不能攝陽信斯言也世有尪羸之夫怯弱之婦屢屢受胎雖欲止而不止者亦有壯年精力過人乃艱於育嗣者獨何歟丹溪論治婦人以經水為主然富貴之家侍妾已多其中寧無月水當期者乎已經前夫頻頻生育娶之以圖其易者顧亦不能得胎更遣與他人轉盼生男矣豈不能受孕於此而能受孕於彼乎愚以為父母之生子如天之生物易曰坤道其順乎承天而時行夫知地之生物不過順承乎天則知母之生子亦不過順承乎父而已知母之順承乎父則種子者當以男子為主男子為主而交媾之時又以百脈齊到為善交媾而百脈齊到雖老弱易泄亦可以成胎若交媾而百脈參差雖少壯康寧難泄亦不能成胎婦人所構之血固由於百脈合聚較之男子之精不能無輕重之分也若男女之辨又不以精血先後為拘不以月經盡幾日為拘不以夜半前後交媾為拘只以男女精血各由百脈齊到者別勝負耳是故精之百脈齊到有以勝乎血則成男矣血之百脈齊到有以勝乎精則成女矣至有產而不育者有育而不能壽者有壽而黃耇無疆者則亦以精之堅脆分為修短耳世人不察精之堅脆而定於稟受之初此論其常也有少年斫喪而夭者此論其變也乃以不育轉付之兒以壽夭專諉之數不甚謬乎宋遂真先生曰男女交合有丟泄前後之分男曰泄女曰丟蓋婦人月事已淨其樂欲之時絪縕之候氣蒸而熱昏而若悶有不可明言之狀此的候也交接之候意合情濃相持不捨則百脈齊到而成胎矣若男情已淡女意未休則男先泄而成女如女先丟而男後泄者則成男矣則知男女各有精非獨男也易曰男女媾精萬物化生而交合之後即以宗筋驗其有血無血立見矣則知男女各有精也明矣蓋月水初淨新血始生藏而不露故交合之後毫無血痕也經云陰精所奉其人壽陽精所降其人夭信斯言也苟能清心寡慾待時而動亦何所求而不得子歟巢氏論婦人妊孕一月懷胎似露珠名曰胎胚足厥陰脈養之二月大如桃花痕名曰始膏足少陽脈養之三月始分男共女名曰始胎手心經脈養之四月形像俱分明始受水精以行血脈手少陽脈養之五月五臟俱生足始受火精以成其氣足太陰脈養之六月方才六腑成始受金精以成其筋足陽明經養之七月發生通關竅始受木精以成其骨手太陰脈養之八月動手遊其魂始受土精以成其膚革手陽明經養之十月受孕足方生臟腑關節人神俱備矣女科地黃丸治婦人經水不調熟地四兩山萸二兩山藥二兩丹皮兩半茯苓兩半艾葉五錢醋炒香附三兩童便制炒阿膠一兩共為末蜜丸滾湯下正元丹調經種子香附一斤用蘄艾三兩先以醋同浸一宿分開制醋童便鹽山梔湯各制四兩阿膠一兩蛤粉炒枳殼兩半炒半生半生地熟地歸身白芍川芎茯苓各四兩琥珀二兩共為末醋糊丸每日早晨空心淡鹽湯送下千金種子丸令人多子並治虛損夢遺沙蒺藜四兩白蓮鬚四兩萸肉三兩芡實四兩覆盆二兩龍骨五錢火煅共為末蜜丸空心淡鹽湯下忌房事一月聚精丸魚膠一斤蛤粉炒成珠沙蒺藜半斤馬乳浸二宿如無馬乳以牛乳代之蒸一炷香上為末蜜丸如桐子大每服八十丸空心溫酒下五子衍宗丸添精補髓枸杞子菟絲子各八兩五味子一兩覆盆子四兩酒洗車前子一兩上為末蜜丸空心淡鹽湯送下壯陽丸治陽痿氣餒不振老年無子此藥允宜肉蓯蓉仙茅蛇床子山藥五味子補骨脂茯神紫霄花杜仲韭菜子雄雞肝鱉肝海狗腎如無海狗腎以黃狗腎代之上藥共為末先將雞肝鱉肝用鹽酒椒蒸熟搗爛和前藥曬乾再將前末藥磨細用酒拌山藥末醋調糊為丸空心淡鹽湯下百丸如陽痿精冷加肉桂附子石燕各一兩金鎖思仙丹治男子欲勞過度精神不繼蓮蕊蓮子芡實各等分茯神三兩共為末用金櫻子一斤去毛煎膏為丸每服三十丸空心淡鹽湯送下服過一月後即不走泄遇種子期用車前子湯送下胎前門受妊脈法兩尺脈微而帶數兩寸浮大兩關滑身中無熱脈亦洪此是婦女胎脈法男女脈法左手滑大而疾男右手滑大而疾女更參乳核孰先生右女左男信無差雙胎脈法雙胎脈法問如何兩手俱洪斷不誣欲識是男並是女縱橫詳見叔和歌死胎脈法脈來沉細腹腰疼胎伏多寒冷是冰再看舌色青紋起胎死何須問鬼神鬼胎脈法脈來亂點如風雨忽去移時又復來此是夜叉人不識即時診斷勿疑猜逐月胎形論初月胎形似珠露未入宮羅在昆戶猶如秉燭在風前風急此時難庇護初月胎形如草上珠露未有宮羅也在昆戶之所未入腹內也其形欲聚欲散未得堅強也如月信報之當時頭暈噁心不喜飲食六脈浮緊者是也多有畏羞隱諱而醫者不識作歇經者亦有之宜服安胎和氣飲或病後受胎或稟氣虛服罩胎散安胎和氣飲白芍木香益智仁砂仁香附紫蘇甘草加蔥水煎服罩胎散當歸川芎白芍砂仁甘草枳殼二月胎形北極中如花初綻蕊珠紅分枝未入宮羅內氣受陰陽血脈同二月胎形受血近陰在母北極之中陰戶內六寸是也其胎入腹未有衣裹或負重觸傷胎氣必致頭暈目眩噁心嘔吐不思飲食宜服保胎和氣飲藿香厚朴廣皮枳殼砂仁黃芩桔梗蒼朮小茴紫蘇三月胎形似血英有宮血室未硜硜母憎飲食諸般愛苦辣酸鹹並納成三月胎形與二月相等不問虛弱胎氣不和噁心嘔吐兼秋風時氣寒熱頭疼悉照前安胎和氣飲加減如寒熱不退加柴胡黃芩咳嗽加杏仁喘急加沉香四月胎形入宮室在母臍胯內相過兔獐熱物諸般忌免兒唇缺及瘋麻四月胎形入宮羅之室河車衣裹漸至丹田忌食一切毒物如無鱗魚鱉之類以免貽毒小兒如身體疲倦氣急發熱飲食無味嗜臥頭暈四肢痠軟宜服活胎和氣飲陳皮香附砂仁小茴蘇葉厚朴蒼朮枳殼甘草五月胎形男女分四肢胞穩不須憂男酸女淡思餐味此定陰陽造化云五月胎形男女已定令胞母前行使人後喚之左回頭是男右回頭是女男思酸女思淡已入宮室之內其胎安穩胎母喜嗜臥飲食無味肚腹脹悶宜服瘦胎飲當歸益母草砂仁益智仁枳殼香附白芍水煎服六月胎形在腹遊左手男胎似線抽女魂右手輕搖動卻在臍中漸漸浮六月胎形男動於左女動於右在母臍中漸漸浮動若胎母虛弱用瘦胎飲使胎氣調和易於產育七月胎形身覺邪男將左手動拿拿女能右手時時動行步艱難母嘆嗟七月胎形男向左脅動女向右脅動胎重如石行步艱難脾胃虛弱氣急上衝胸臆以致腹滿喘咳卒然頭暈勿以中風治之此乃胎氣熱邪不安否則令兒衝心名曰子懸宜服知母安胎飲知母蘇葉黃芩香附枳殼滑石甘草益母草水煎服八月胎形具備身毛髮生長定精神窮思飲食吞難下困弱憂愁眈悶因八月胎形毛髮俱生胎母心悶煩躁味美不甘胎氣因弱以致脾胃不和宜服和氣平胃散和氣平胃散治胎氣不和熱毒瀉痢蒼朮厚朴陳皮升麻柴胡白芍地榆肉果澤瀉水煎服九月胎形重若山七情開竅一般般每夜一升三合血待時生育暫時難九月胎形眼有光鼻有氣耳聞強口知味身舒縮人道俱全出世將轉身大動胎母左右脅知覺宜服保胎如聖散保胎如聖散治產忽然腹痛先行其水嬰兒降下忽誤吞熱物傷胎者當歸紅花益智白芍益母草甘草如兒不下取鯉魚一尾同藥再煎入醋一杯服烏金丸烏金丸阿膠四兩艾葉二兩穀芽二兩麥芽二兩蛇殼一條五味一兩上為末醋糊丸如彈子大每服一丸十月胎形已完足四肢罅縫骨精開坐產即宜加謹慎莫教兒下客氣來十月胎形完足中肢罅縫俱開至期產下莫令久臥地下莫被賊風吹犯急令包裹滿月之後始得平安宜服活水無憂散因兒未下恐穩婆動手活水無憂散急性子當歸益母紫蘇艾葉秦艽陳皮肉桂枳殼白芍生地鯉魚一條水煎加醋一杯服烏金丸如兒死腹中不下急取無根水再煎服此急救之法妊娠調護法保元論云婦人妊娠常令樂意運動氣血安養胎元早當絕欲節調飲食內遠七情外避六淫性宜靜而不宜躁體宜動而不宜逸味宜涼而不宜熱食宜暖而不宜寒毋久立久坐毋久行久臥又宜卻除一切肥甘以及煎炒炙爆油膩辛辣水果魚鱉兔鴿牛馬之肉以及鰻魚鰍鱔無鱗等魚一切避忌便無胎漏下血子腫子癇子懸等症以及橫生逆產胎傷腹中之患生後亦無胎熱胎寒胎肥胎怯以及胎驚胎毒之證遺累小兒前賢胎教云婦人妊娠寢不側坐不偏立不蹕不食異味目不視惡色耳不聽淫聲口不出惡言非義之物不取非理之財不收宜聽誦讀詩書講論致知格物道理則生子形容端正才器過人嘗見稟性溫良之婦有妊而少嗜欲生子少病而痘瘡亦稀此其驗也指掌訣云胎前眾集要須知惡險當從痰火推胎上湊心胸脹滿子懸芩術炒山梔妊娠下血名胎漏血熱而成或氣虛胎動芎歸與膠艾安胎順氣勿教遲子淋須覓安榮散胎水還當用鯉魚腫滿遍身如水氣但煎防己自寬舒足趺浮腫身無恙皺腳安胎大腹皮五月以來煩躁甚子煩知母麥冬醫妊娠腹疼分虛實寒熱溫清可辨之子癇急服羚羊角兒暈芎歸荊芥奇瀉痢蒼砂加二白熱須芩術信為宜風寒感冒參蘇飲不解黃龍湯勿疑胸滿本方加枳殼熱而無汗葛根驅裡熱甚時罩胎散熱極譫語五苓施脈遲四逆理中治熱泄柴芩半夏除汗吐下溫須仔細安胎為主勿差池清脾療瘧須除半四獸驅邪更補脾痢疾香連丸有驗胃風主痢補其虛傷風咳嗽芎蘇飲半貝杏芩桑白皮秘結不通麻子飲小水不利麥冬葵怔忡恍忽心驚悸氣悶喧呼大聖祛心痛火龍湯可定腰疼痛氣更難知達生散可將胎束欲服須當九月時又云孕婦之脈陰搏於下陽別於上血氣調和有子之象手足少陰其脈動甚尺按不絕此為有孕少陰屬心心主血脈腎為胞門脈應於尺或尺脈微關滑尺數往來流利脈微帶數身中無熱脈帶洪滑當詰月事仔細參酌婦人似病而無邪脈是孕非病所以不應欲別男女左右取之左疾為男右疾為女沉實在左浮大在右右女左男可以預剖離經六至沉細而滑陣痛連腰胎即時脫半產漏下革脈主之弱即血耗立見傾危瑣言識之概可類推大凡婦人妊娠貴乎衝任脈旺元氣充足飲食如常身體壯健色澤不衰而無雜病相侵則十月滿足分娩定然無虞若氣血不充衝任之脈虛弱經必愆期而不受孕即使得孕胞門子戶虛寒受胎終歸不實李南宮曰胎前諸病惟當順氣安胎若外感四時之氣或內傷七情以成他病治法與男子無異當以各證類求之動胎之藥切不可用聖濟總錄云安胎有二法有因母病以致胎動者但治其母胎自安若胎氣不固觸動以致母病者宜安胎而母自愈矣先師天錫陳先生曰妊娠之婦身體康健飲食如常可保平安勿生顧慮勿妄服藥勿過飲酒勿舉重登高勿多睡臥閒則步於庭勿犯房事擾亂子宮不安難免產子艱難且生後多子胎疾慎之慎之凡孕婦墮胎有二故一為跌僕負重軋傷一為氣血不足蓋腰膝系胎之處如瓜果之蒂花卉之根不得露不長受熱亦易傷故一月厥陰用事臟腑不能輸精於肝而致疏泄者有之二月少陽用事臟腑不能輸精於膽而致萎瘁者有之三月手心經脈用事臟腑不能輸精於心而致朽腐者有之四五七月墮者莫不皆然是故安胎之法當視其虛實寒熱而藥之則無不安矣小產小產者言非大產在四五六月之間而墮者所謂半產是也若二三月人像未全還是血塊苟有所傷而墮者非曰墮胎三者皆屬根蒂不固衝任經虛須分是火是寒治之有火者清之白朮黃芩之屬而益以養血也寒者溫之膠艾桂附之屬而加六味然桂附辛熱尚宜酌用切勿輕投實者清之虛者補之尤當顧脾胃以生新血蓋胃為水穀之海脾為萬物之母人身之有脾胃猶萬物之有土也有土乃生金金生水水生木木生火故培土而五行有相生之妙扶脾胃而五臟有遞受之益在孕婦永保無虞何有墮胎小產之虞哉宋遂真先生曰前哲云初受胎而即墮者肝血虛也胎以血為本肝臟虛則生髮之機困如春初多冷草木不芽可知也治宜益肝血胎斯固矣二月墮者亦然實者反是三月墮者心血虛也胎以血為根本心臟虛則長茂之氣消如夏初天氣暴寒而花果不實可知也治宜養心補血胎斯固矣四月墮者亦然五六七八月而墮者責在氣血之並虛也蓋氣為血之衛血為氣之配氣不能衛血則血無所統血不能配氣則氣無所歸兒在母腹中所賴母之氣血充和耳苟有所傷安所賴乎是以調氣先必養血蓋血尤須補氣養血而血不生補血之源腎水是也補氣而氣不足補氣之根命門火也故五六月間而有墮胎者六味去丹皮加人參麥冬杜仲續斷為要藥寒痛者加附子少許百無一失也有胎亂動而不休者胎熱也不可用燥熱之劑此外胎動者或因衝任經虛或因七情六慾或因過服熱藥須各審清病源而治之如四五月間心中昏悶四肢沉重不能移動惡聞穀食喜吞酸味胎動不安安胎飲主之或紫蘇飲加半夏茯苓枳殼安胎安胎飲治孕婦三四月胎動不安熟地當歸茯苓甘草川芎白朮半夏阿膠地榆白芍加姜三片水煎服紫蘇飲紫蘇陳皮當歸白芍川芎人參甘草腹皮安胎和氣飲又名達生散白朮陳皮白芍木香陳倉米姜水煎膠艾湯治半產下血阿膠川芎當歸艾葉甘草白芍熟地炮姜安榮散治子淋人參當歸通草滑石麥冬各二錢燈草五錢甘草五分為末每服二錢麻子潤腸湯治風結血結麻子當歸桃仁羌活大黃香連丸黃連吳萸湯拌炒木香曬乾研末之醋糊為丸五苓散豬苓茯苓白朮澤瀉肉桂加燈心煎四逆湯附子乾薑甘草腹痛加白芍理中湯白朮人參乾薑甘草鯉魚湯當歸錢半白朮白芍各一錢茯苓錢半赤小豆八分木通八分車前八分鯉魚一條七情湯肉桂陳皮人參甘草二白丸治淋帶石灰一兩茯苓二兩為末用蕎麥麵雞子清調糊為丸每服三十丸空心白滾湯下化氣湯砂仁香附廣皮蘇梗川芎枳殼胃風湯人參白朮茯苓當歸川芎白芍肉桂加粟米百粒清脾飲青皮厚朴柴胡黃芩半夏茯苓白朮甘草草果羚羊角散治子癇風痙羚羊角獨活棗仁茄皮米仁防風當歸杏仁茯苓木香甘草姜四獸飲半夏人參茯苓白朮橘紅烏梅草果甘草生薑火龍湯治孕婦心痛因寒邪犯胃蘄艾鹽水炒五錢茴香五錢炒川楝子五錢炒上藥為二劑水煎服黃龍湯治孕婦新產傷寒柴胡二錢黃芩一錢半人參一錢甘草五分姜三片水煎服防己飲治足脛腫痛防己木通檳榔生地川芎白朮蒼朮黃柏犀角甘草半夏茯苓湯治惡阻嘔吐心煩惡聞食氣多臥半夏一兩二錢赤苓熟地陳皮白芍人參川芎桔梗旋覆甘草千金方無旋覆花有細辛蘇葉上藥共為粗末姜七片水煎服驗胎方經水不行疑似未明者川芎為末每服一錢試之艾葉湯調服覺腹中微痛則有孕矣大全方論半夏動胎不用仲景用之取其辛以散結氣瀉逆氣故惡阻用之而非專為痰設也婁全善治妊娠惡阻累用半夏未嘗動胎而鄭氏專門女科亦嘗用之經云有故無殞者是也不必拘泥
