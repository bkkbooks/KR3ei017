front:
  text: 自序古云寧醫十男子莫醫一婦人誠以女病倍於男子而更多不可名言之隱也其居富貴之地者更面藏帳幃臂蓋綺紈醫者望聞既難切脈亦無從仔細故女科益難從事焉余幼殫精舉業亦究心岐黃緣歷試不遇遂以方藥應世數十年來窮源竟委上採前賢之著述旁錄時人之議論成痢症匯參一書既為四方君子稱評勸授梓人茲復念女病難醫即平日所輯前哲要語分門別類匯為一帙顏曰女科切要質諸二三同志俱云語簡而明此書一出將臨症者俱可唾手取驗而至難醫者從此不難亟當傳世以為普濟之資因不揣固陋勉付剞劂云時乾隆癸巳小眷梅溪吳道源題年七十有五
