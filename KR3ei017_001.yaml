body:
  text: 卷一調經門經閉為女人病者蓋因女子以血為主也使其經脈調和往來有準有以應水道潮汐之期舊血既盡新血復生有以合造化盈虧之數則周身百脈無不融液而和暢夫何病之有設或閉焉則新血滯而不流舊血凝而日積諸病叢生凡血癖血風與夫熱入血室之證多自此而始矣然要其經閉之由必要所因或月事適至之時因渴飲水並食生冷之物及坐冷水中洗浴寒氣內入血即凝滯遂令經閉又或因墮胎多産而傷其血或因久患潮熱而銷其血或因久發盜汗而耗其血或脾胃不和飲食減少而不能生血凡此類皆能令人經閉其肥白婦人經閉而不通者必是濕痰與脂膜壅塞之故也宜以枳實為君佐以蒼朮半夏香附烏藥厚朴牛膝桃仁之類則濕痰去而脂膜開其經自通矣黑瘦之婦經閉者血枯氣滯也治宜補血理氣君以歸身白芍人參廣皮香附之類或因墮胎多産而傷其血或久患潮熱而銷其血者不可用行血之劑宜以四物為主佐以木香香附厚朴甘草之類兼調其氣久而自通矣有因感暴怒而經閉者治宜開鬱活血君以鬱金佐以官桂香附木香桃仁牛膝之類煮酒煎服或因食生冷而經閉者君以官桂佐以乾薑木香厚朴香附紅花歸尾之類因坐冷水而經閉者君以附子佐以官桂木香山楂桃仁當歸乾薑川芎之類室女及笄而天癸不至而飲食如常者只是氣血未足人間往往有之必服藥療其雜病時至經自流通亦有年長大而經竟不來者仍能受孕名曰暗經每月至期必作腰痛此前人之所未發也有至期而經水不行上逆而嘔血者名曰倒經治宜當歸大黃湯有室女經水既通而至期復又不來者必須視其有證無證驗其似疾非疾若面色不改飲食如常身無內熱名曰歇經非疾也乃血不足也若面黃肌瘦內熱是為童癆診其肝脈弦出寸口上魚際非藥所能治也急與之成婚則陰陽和自然經行而疾去矣否則十死八九亦有氣血不足者必面黃肌瘦常帶微熱雖歇幾年服藥亦可通之但不可用破血剛猛之藥如虻蟲山甲三稜莪朮之類只宜用補血生血之藥以四物歸脾加減可也至寡婦尼姑經閉乃因有懷不遂法當開鬱而理其經為妥大凡婦人經閉氣不調和因而血不流轉故也故調經須以理氣為先亦有血海虛寒小腹冷痛者是宜服大溫經湯有氣血虛損者外發潮熱頭痛昏重肢體倦怠五心煩熱心忡面赤口燥神焦腰背痠疼盜汗出者是也宜服丹皮散有氣血凝滯腹中結塊腰腿重疼者是也宜服通經六合湯或紅花當歸散以逐其瘀通其經絡也亦有胃氣不調者貌本壯實飲食漸減者是也蓋胃氣不調亦能令人經水不通當以異功散逍遙散之類間服一以消食健脾使飲食加而元氣復一以和其氣血使氣血調而經自行矣凡婦人女子骨蒸潮熱痰嗽經水不行診其脈七八至視其骨肉消瘦必死之症不必用藥大抵男子與婦人同四物湯熟地當歸白芍川芎水煎服歸脾湯人參白朮土炒棗仁茯神黃耆錢半當歸遠志一錢木香炙草五分龍眼肉薑棗煎服大溫經湯鹿茸香附沉香白朮陳皮熟地當歸白芍川芎吳茱萸小茴茯苓元胡人參甘草丹皮散丹皮肉桂歸尾元胡牛膝赤芍三稜莪朮水煎服通經六合湯熟地白芍當歸川芎半夏茯苓益母貝母白朮知母橘紅水煎服紅花當歸散當歸紅花桃仁元胡川芎小茴鬱金水煎服如聖散治崩漏不止棕灰薑灰烏梅各五錢水煎服逍遙散解鬱調經當歸白芍茯苓白朮甘草柴胡薄荷丹皮山梔化氣丸大凡女子稟性偏執若欲治病先戒性急或因怒氣或因憂鬱憂鬱生痰怒氣傷血或為疼痛或為淋疾淋有五種變為五色若欲無病經水要正月應乎天水應乎地一月一來如期潮信懷孕安胎坐草理順經或不準前後當訊參前屬熱落後屬寒熱當清涼寒宜助溫血熱血虛或清或補有孕得疾先保其胎次調其疾宜無後災延及産後疇能救哉新産之後醫法有餘先去惡露後當補虛補虛太早穢不能除噁心氣喘瀉利汗珠此為四惡扁鵲難醫症見一惡病亦難起小心醫治免死而已十月懷胎一朝坐草瓜熟蒂落慎勿起早無知婦女昏愚嫗老非理催逼反成煩惱叮嚀戒爾守此正道孕婦之脈堅強最妙細而微濡命恐難保新産之脈沉遲細小倘遇洪大其症必倒敗血衝心語言亂道或笑或歌佛名神號痰犯心包同是狀貌敗血攻心始終煩惱龍齒參歸十神湯效痰犯心包昏而有覺重加芩連導痰湯較或夾疾病先慎風寒炙爆油膩萬勿加餐病久危困先喻其難醫為仁術細審病端子懸子冒子煩子癇治各有條不容遺漏已經懷孕月水仍來血有餘也名曰胎漏生子不實腹中有塊血氣之郁溫血益氣削除其積元氣若虛且從姑息虛弱之證自汗骨蒸參耆胡連治之量情神仙妙術起死回生悉心體之用無不靈經水先期而來室女婦人經事先期而來其故有二有熱甚者有氣血多而傷血海者血熱者腹多不痛乃火也身必熱其色必紫其脈必洪宜涼血地黃湯虛熱者逍遙散或補中益氣加黃柏知母或四物加陳皮香附黃柏知母醋糊丸服如腹中冷痛禁用寒涼而用五積散若瀉者先理脾胃咳嗽者逍遙散加川貝若氣血多而傷血海者其腹必痛以補血行氣為主亦慎用涼藥宜歸附丸及霍香正氣散若婦人四十外月經或二三日一至者日久必成淋症王肯堂曰月事先期而來血熱必帶紫色或先或後血色淡而稠黏者痰也將來而先腰腹痛者血海空虛而氣不收攝也或止或來無定期者因氣不調故血亦隨之為行止也或一月兩至或數日一至乃氣虛而血熱也或經年之後纍數日而不能止者乃血海脫滑兼有火以動之也既止之後隔兩三日而復見微血者以舊血未盡為新生之血所催故不能容而復出也明理者觀之即可以施治矣經水過期而來凡婦人女子月事過期而來其説有三有血虛者有血寒者有濕滯者血虛腹不痛身微熱然亦有腹痛者乃空痛也宜服生氣補血之藥八物湯加香附血寒者歸附丸以脈辨之若浮大而無力微濡芤細皆虛也沉遲弦緊皆寒也王肯堂云經水過期而至血虛也其色必淡治宜補血為主以四物加香附艾葉五味麥冬之類倍加當歸熟地血淡而稠黏者以化痰為主二陳湯加香附生薑砂仁如經水將來而腰腹痛者以行氣為主宜君以木香佐以枳殼香附同四物煎服如經水止而復腰腹痛者以補血為主君以熟地佐以歸芍參朮芎苓香附陳皮甘草之類或一月兩至數日一至者以補血涼血為主宜八物湯加黃連山梔龜板炒蒲黃之類或止或來無定期者以調氣為主君以香附佐以陳皮烏藥砂仁艾葉之類與四物同煎服經數日不止者以涼血為主君以炒黑山梔佐以炒蒲黃地榆炭牡蠣側柏香附之類經正後過二三四日復見微血者以四物湯為主加香附陳皮甘草之類煎服然此不足為病即不服藥亦無害也八物湯熟地白芍川芎當歸白朮人參廣皮半夏五積散白芷陳皮厚朴當歸蒼朮麻黃川芎白芍官桂桔梗甘草水煎服二陳湯半夏茯苓陳皮甘草水煎服醋煎散赤芍烏梅甘草香附三稜莪朮官桂加醋半杯水煎血多加當歸紅花青皮艾煎丸白芍熟地艾葉川芎當歸人參石菖蒲各等分為末醋糊丸歸附丸當歸附子逍遙散見調經經行腹痛婦人經水適行小腹作痛者氣血澀滯也用四烏湯經行而腹痛者或屬虛寒然氣亦能作痛恐有血瘀氣滯不必驟補先用四物加陳皮香附次用八物湯加香附如瀉者先止其瀉而痛自止矣有每遇經行輒頭痛心忡飲食減少肌膚不潤澤者宜加減吳茱萸湯亦有衝任虛衰小腹有寒月水過期不能受孕者大溫經湯主之有經水過而作痛者血虛有寒也法當溫經養血宜四物加桃仁香附肉桂有經行著氣心腹腰脅疼痛者血瘀氣滯也當順氣消瘀青皮歸芍桃仁紅花川芎烏藥水煎服有經水過期而來作痛者血虛有熱也宜生血清熱四物加桃仁香附丹皮甘草元胡有經水行後而作痛者氣血虛而空痛也法當調養氣血宜八珍湯加薑棗有經水過多久不止而腹痛者乃脾經血虛也治宜補血健脾四物加白朮茯苓木香厚朴香附陳皮乾薑甘草水煎血風血風者經水逆行上攻於腦頭目旋悶不省人事甚至滿頭滿面皆發赤斑者此因經水適臨感冒風邪所致蓋風善行而數變其勢易上而難下經水為風邪所激以故倒流而上行也血風乃血證中之最急者宜以四物為主加山梔桃仁紅花荊芥防風天麻薄荷白朮之類其所以用白朮者以其能去面上遊風及利腰臍間血故也四烏湯烏藥當歸三稜文術赤芍紅花桃仁官桂益母香附吳茱萸湯吳萸人參大棗老薑八珍湯熟地白芍川芎當歸人參白朮茯苓甘草八物湯見經水過期大溫經湯見調經四物湯熟地白芍當歸川芎
