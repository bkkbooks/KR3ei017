body:
  text: 卷二血崩崩淋之病相似而實不同崩者如土之崩其勢大下而不禁乃血熱而兼氣虛不能收攝也淋者如水淋漓艱澀而不通快乃內鬱熱而氣亦滯也然崩則純血淋則有赤白沙石之異赤者屬血白者屬氣沙石者氣血之尤濁者也治此病者惟調其氣血清其內熱而已鄭文康曰婦人暴崩下血此因腎水陰虛不鎮制胞絡相火故血走而崩也涼血地黃湯主之然此症多起於內傷若小腹不痛只宜此藥或八物湯加芩連若痛者先宜大劑四物湯歸身白芍川芎倍之加醋製香附若用補藥宜補宮湯加芩連又血崩證有二説瘀血也空痛也瘀血者體必作寒熱空痛者不作寒熱也瘀血則當去空痛則當補亦有血海虛寒外乘風冷搏結不散血氣成塊而得之宜神仙聚寶丹又有血氣損而得之者凝聚成塊七癥八瘕上則氣逆嘔吐下則瀉痢五血宜內炙散血崩之人如服煎藥不效者火也三黃湯主之去大黃加黃柏如婦人血崩不止乃衝任虛弱臟腑虛冷所致也亦有小腹急痛兼下赤白帶宜加減吳萸湯或艾煎丸若去血過多氣血不足四肢倦怠宜增損四物湯蓋婦人血漏血脫則宜固氣此古聖之心法也先補胃氣以助生髮之源諸甘藥為之先務益胃升陽湯是也此藥人皆認以為補氣殊不知甘能生血此亦陽生陰長之理也又人身以谷為寶藥料須視其食之多寡而輕重之毋令藥氣勝於穀氣乃妙耳如腹痛加烏藥三分官桂少許口渴者加葛根三分如婦人年老血崩八物湯加芩連此一時急救之藥也必先顧其胃氣為妙如血崩服煎劑不止易用散子之藥如棕灰鍋底墨炒黑山梔槐花側柏人參黃耆甘草之類為末童便送下若以為丸更妙或用小薊汁藕汁調服經曰帶下血崩脈多浮動虛遲者生實數者重訣曰生地合蒲黃黃芩黃柏涼人參兼五味解毒細煎湯水煮空心服崩中帶下良暴者屬血熱宜養血清火治宜溫清散血崩月久屬虛寒又宜溫補宜益母湯其寸口脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相搏此名曰革溫清散歸身熟地白芍黃連黃芩川芎山梔炒黃柏鹽炒各一錢水煎服益母湯涼血補血熟地陳皮香附阿膠益母草白朮蒲黃甘草黃芩各一錢水煎空心服五灰散涼血止血蓮房灰黃絹灰血餘百草霜棕灰白芨為末蜜丸米飲下張三錫曰崩有五種青崩如藍色黃崩如爛瓜赤崩如絳澤白崩如涕液黑崩如瘀血崩漏不止四物加炒白朮參耆香附炒地榆炒蒲黃棕灰升麻血餘水煎頭昏項強者四物湯加柴胡防風虛冷清瀉者四物湯加官桂附子薑棗水煎胃虛嘔吐者四物加人參白朮虛煩不眠者四物加人參淡竹葉發寒熱者四物加柴胡崩中漏下五色者用赤石脂禹餘糧湯槐芩散治崩中不止炒槐米三兩黃芩二兩炒研為末每服五錢霹靂酒調服赤石脂禹餘糧湯赤石脂煅禹餘糧煅牡蠣煅烏賊骨去甲伏龍肝上肉桂各等分為細末酒調服鳧柴散專治婦女血崩地栗每歲用一個燒灰存性研服溫酒送下補宮湯治血崩身發寒熱熟地白芍阿膠地榆艾葉川芎歸身水煎服又方亦名補宮湯治崩淋衝任虛損赤石脂地榆歸身艾葉甘草石菖蒲白芍川芎蒲黃炒熟地小薊水煎沖熱酒半杯服益胃升陽湯人參白朮黃耆當歸陳皮黃芩升麻柴胡甘草神麯薑棗水煎服三黃湯黃芩黃連黃柏鹽水炒百補湯治血淋大熟地當歸川芎白芍阿膠新會皮地榆炒炭水煎服便濁婦人便濁或赤如血或白如泔不痛者是痛則淋矣屬濕熱分虛實而治肥白之婦脈沉滑胸膈不利小便白濁屬濕痰宜燥中之濕如面色不澤身倦無力者屬氣虛宜補氣黑瘦之婦脈洪數五心煩熱頰赤唇乾小便赤濁或白屬相火宜滋陰肝脈弦數有力火盛者龍膽瀉肝湯治法分滲清熱燥濕健脾滋陰降火實下固陽濁氣下流為赤白濁赤者升柴二朮二陳最妙白者黃柏當歸知母白芍丹溪謂二術二陳能使大便潤而小便長如兩尺脈沉弱白濁頻數凝白如油光彩不定漩腳澄下凝如膏糊古方悉指為陽虛亦有虛而挾相火者不可不辨宜萆薢分清飲專主陽虛白濁內經曰中氣不足小便為之色變必先補氣升舉之而後分其臟腑氣血赤白虛實治之有邪熱者瀉熱虛者補虛設使腎氣虛甚或火熱亢極者則不宜純用涼藥必反佐治之要在權衡輕重而已赤者熱傷血宜滋陰白者濕熱傷氣又宜燥濕白濁不止宜服珍珠粉丸用之屢驗氣虛四君子湯血虛四物湯氣血兩虛八珍湯下珍珠粉丸珍珠粉丸樗皮炒黃黃柏鹽水炒青黛蛤粉滑石珍珠等分為末神麯糊丸無火者加炮薑方用樗皮黃柏能燥濕清熱青黛能解鬱熱蛤粉鹹寒引下滑石利竅珍珠寧神定志如上盛下虛心火上炎口苦燥渴五心煩熱小便赤澀或下白濁宜清心蓮子飲清心蓮子飲石蓮子即建蓮中擇有黑殼者人參赤苓麥冬黃耆地骨皮黃芩車前子生甘草白濁經年不愈者形神衰瘦心神不安當作心虛治珍珠粉丸合定志丸間服定志丸遠志石菖蒲各二兩人參白茯苓各三兩共為末蜜丸硃砂為衣每服七丸空心米湯下龍膽瀉肝湯膽草黃芩山梔澤瀉木通車前當歸生地柴胡甘草萆薢分清飲智仁萆薢石菖蒲烏藥等分茯苓甘草飛滑石加鹽少許分清飲芡實茯苓黃蠟蜜丸如桐子大每服百丸淡鹽湯下二術二陳湯白朮蒼朮廣皮半夏茯苓甘草升麻柴胡水煎服白淫經曰思慮無窮所願不遂意淫妄想入房不能帶脈不引則為白淫夫腎臟以慳用事志意內治則精全而澀若眠思夢想欲淫不能則淫泆不守輒隨溲便而下也尼姑寡婦最多此症白淫責於陽虛當益火之源鹿茸肉蓯蓉人參之類治宜內補丸要在臨症斟酌有火無火而用之庶無誤矣內補丸鹿茸絲子沙蒺藜紫菀茸黃耆肉桂桑螵蛸肉蓯蓉附子制茯神白蒺藜上為末蜜丸如緑豆大每服二十丸食遠酒服有火者忌用宜服清心蓮子飲見便濁婦人之白帶白淋白淫白濁其形相似病實不同有虛實寒濕郁火不可混治前賢議論通作濕熱不無偏僻細考內經治法不一白淋者淋瀝而不止也多起於郁大抵虛寒者居多小腹不痛亦有去多空痛者俱用養榮湯加香附補宮湯亦可若用熱劑艾煎丸加白芍痛者四烏湯加白芍歸身亦有白淋久則漸變黃色者此將成血淋也艾煎丸歸附丸皆可服又有變為沙淋者溺器中下沉白積一層如沙小便出時澀痛者是也白淋赤淋而無沙者須分其氣血而治之白帶者婦人之常病俗云十婦九帶甚者腰痛如折頭暈眼花腰間重滯不斷此是氣虛治宜內補湯加續斷或養榮湯再以車前草陰乾煅灰頻頻服之其效甚捷屢驗若五色帶下紫金丸主之白淫乃思想無窮有欲不遂一時放白寡婦尼姑此疾居多乃鬱火也治宜開鬱降火越鞠丸加鬱金膽草白濁甚者膀胱積熱渾濁如膿不治必生癰宜服蓮子清心飲蓮子清心飲見白濁艾煎丸見經水過期內補丸見白淫四烏湯見血風補宮湯見血崩越鞠丸香附山梔半夏神麯川芎鬱金膽草人參養榮湯治脾肺氣虛榮血不足人參當歸熟地白朮黃耆茯苓遠志白芍五味廣皮肉桂甘草加薑棗水煎服淋證經曰白者屬氣赤者屬血但有氣血之分而無寒熱之辨凡治此者皆云濕熱然乎否乎今之治白淋者不分寒熱多用芩連亦一偏之見耳婦人之疾寒多熱少故用養榮湯治白淋而效以其有桂也艾煎丸服一二料而即愈亦此義也總在臨證時審白而治之至赤淋則為熱證不服熱藥內補艾煎禁用宜服八味加芩連而香附尤不可少此女科之聖藥也張景嶽論崩淋之證甚悉已載在血崩一條其云治此病者惟調其氣血清其內熱最允又血淋者月水三五一至積數月而止者是也若腹痛四烏湯恐有瘀血未可止也去多不痛善飲食者八物湯加芩連如飲食少進用內補湯去參可也或補中益氣加黃柏凡治血淋審其小腹痛與不痛脾胃之實與不實如小腹不痛脾胃實也可用八物湯加芩連脾胃不實者禁用宜補宮湯大抵淋證先以治脾為主養榮湯見白淫四烏湯見血風八物湯見經水過期補中益氣湯黃耆白朮人參陳皮歸身升麻柴胡甘草白帶婦人帶下一證從腰間帶脈而來故名曰帶雖有赤白二色終屬腎虛其病與淋相似然淋之所下者多散而薄必覺腥氣臭穢帶之所下者多滑稠黏無腥穢之氣以此為辨耳保命集曰赤者熱入小腸白者熱入大腸原其本皆濕熱結於脈故津液湧溢是為赤白帶下本不病結緣五經脈虛結熱屈滯於帶故臍下痛陰中綿綿而下也內經云任脈為病男子內結七疝女子帶下癥瘕王注云任脈自胞上過帶脈貫於臍上故男子內結七疝女子帶下崩中帶脈起於季脅章門似束帶狀今濕熱冤結不散故為病也經曰脾傳於腎名曰疝瘕小腸冤結而痛出白名曰蠱所以為帶下冤結也冤屈也屈滯而病熱不散先以十棗湯下之後服苦練丸再以大元胡索散調之熱去濕除病自愈矣趙仁安問用升提之法更以二陳加白朮蒼朮健脾燥濕亦是一法論婦人漏下赤白日去血數升其脈急疾者死遲者生如赤白帶不止脈小虛滑者生大緊實數者死羅先生所用十棗湯神佑丸玉燭散之類虛者不可峻攻實者亦當酌用血虛加減四物氣虛參術陳皮補之甚者固腸丸相火動者加黃柏滑者加龍骨赤石脂滯者加葵花性燥者加黃連冬月少加桂附惟在臨證時隨機應變丹溪治赤白帶下與夢遺同法肥人有帶多是濕痰用海石二陳加南星黃柏青黛川芎瘦人帶下俱是鬱熱宜香附砂仁黃柏青黛如結痰白帶以小胃丹半飢半飽時津液下數丸候鬱積行即服補藥調理苦楝丸苦楝子打碎酒浸茴香炒當歸等分為末酒糊丸每服三十丸空心酒下如腰痛四物羌活防風湯下十棗湯芫花炒黑甘遂大戟各等分加大棗十枚小胃丹芫花醋拌一宿瓦器炒黑不可焦甘遂水浸半月煮曬乾製大黃各一兩半大戟水煮一時水洗曬乾五錢黃柏炒三兩共為末白朮膏丸如蔔子大臨臥時津液吞下神佑丸甘遂芫花大戟各一兩醋炒大黃白醜青皮陳皮木香檳榔各五錢輕粉一錢水法丸血臌婦人血臌之證雖有因於氣食而成者然成於血者居多焉若成於氣食腹雖脹而經不閉成於血者其經必閉也婦人血恆有餘故每月見其血而不以為病若閉而不通則日積充滿其始發之時小腹先脹久則上連中脘緊脹如鼓青筋綻露而血臌之證成矣其有因産後惡血不下逆而上升滲入肌膚充滿於中宮甚至上騰於面而成充色者是必死之證也血癖又有癖塊一證雖因痰與血食三者而成然成於血者居多因痰與食而成塊者雖成而不礙其經水成於血者亦有經雖來不時而斷也此必經水既來之候尚有舊血未盡或偶感於寒氣或觸於怒氣留滯於兩脅小腹之間則成血癖也有經水月久不行腹脅有塊作痛是經血作癥瘕法當調經止痛桃仁厚朴當歸紅花香附元胡肉桂丹皮乳香木香牛膝小茴砂仁之類有經行腹痛麻痹頭疼寒熱乃觸經感冒也宜加減五積散若經行時遍身疼痛手足麻痹寒熱目眩照前方去乾薑加羌活獨活白芷當歸官桂麻黃川芎白芍陳皮蒼朮之類又有經水不調小腹時痛赤白帶下乃子宮虛寒治宜艾附暖宮丸亦有行時氣血虛弱血海寒冷經水不調心腹疼痛帶下如魚腦或如泔錯雜不分信期淋漓不止面黃肌瘦四肢無力頭暈眼花者宜補經湯艾附暖宮丸艾葉香附四制元胡熟地甘草共為末醋糊丸如桐子大每服八十丸米湯下補經湯人參白朮川芎香附當歸熟地元胡肉桂吳萸砂仁茯神沉香阿膠黃耆小茴陳皮白芍水煎服經準不孕婦人月信準而不受胎者其故有三有因痰閉子宮者有因氣食生冷者有因男子陽傷易泄者如痰閉子宮者其婦必肥白經來腹不痛宜導痰湯或人參半夏丸之類或二陳合四物湯如氣食生冷所致者其腹多痛宜溫之千金吉祥丸之類如咳嗽又不宜服以四物加陳皮香附山楂如氣作瀉用枳實丸如男子精寒易泄不能受孕者與婦無干只宜男子服藥或謂經水正而子宮寒者萬無是理也蓋子宮若寒經水必過期矣或又云子宮寒者因産時陰戶著寒所致第産後陰戶著寒産婦即便不語豈能語者尚謂著寒乎薛古蒙曰婦人經行不正每不受胎然參前而受胎者亦有之其血熱故也女科書云先期為血熱後期為血氣第有參前落後互兼者何也大抵婦人性執多惱著氣則氣不調矣夫氣為血之母氣亂則經期亦亂矣故調經以理氣為先宜以歸附丸四物丸之類又有衝任寒損胎孕不成或成而後多墮者詵詵丸主之詵詵丸乾薑白朮丹皮元胡肉桂澤蘭熟地川芎白芍當歸石斛上為末醋糊丸煮酒送下異痰湯半夏南星橘紅枳實茯苓人參菖蒲竹茹甘草加薑煎千金吉祥丸天麻煨一兩川芎肉桂丹皮熟地白朮柳絮五味茯苓菟絲子覆盆枳實桃花片各一兩上為末蜜丸如豆大每服五丸空心煮酒送下熱入血室婦人感冒發熱惡寒經水適來得之七八日熱除脈遲身涼胸脅滿譫語此為熱入血室當刺期門隨其實而瀉之凡發熱惡寒七八日熱除脈遲身涼當自愈矣今反胸脅滿如結胸狀譫語此因經水適來血海正開熱邪乘虛入於厥陰藏血之室肝主魂熱邪內擾神明是以胸滿譫語如見鬼狀故刺期門厥陰所注之腧瀉其熱以外泄婦人感冒七八日續發寒熱發作有時經水適斷者此為熱入血室其血必結故使如瘧狀或晝明夜甚譫語如見鬼狀無犯胃氣及上中二焦必自愈上條言脈遲身涼但刺期門此條言七八日續發寒熱發作有時經水適斷血室未閉其血必結忌用苦寒凝滯之藥今有大壩呂天祥媳經水適斷醫以大劑黃連投之少腹結塊而殞婦人熱入血室但頭汗出仲景以小柴胡湯和之家祕倍加柴芩重加歸芍其功最專再加丹皮地骨皮則身熱易退熱入血室發熱晝靜夜甚者亦有虛實不同血虛發熱者皆因營血不足如陰虛內熱之證脈必細數宜補血涼血血熱發熱邪熱入於血分脈必數大不必補血歸芍柴胡湯或導赤各半湯之類導赤各半湯病後心下不硬腹不滿二便如常身無熱神昏不語或獨話目赤口乾不飲水與食則咽不與不思形如醉人黃連黃芩犀角知母滑石麥冬人參茯神甘草加燈心薑棗煎
